<title>Jessika &amp; Milton · 26.09.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..600,0..100,0..1;1,9..144,300..600,0..100,0..1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Parisienne&display=swap" rel="stylesheet">
<style>
:root{
  --linho:#FBF8F3;
  --papel:#F3EDE3;
  --oliva:#5A6247;
  --oliva-claro:#8B9174;

  /* Tons de terra — mesma paleta do traje dos convidados */
  --camel:#C89D6E;
  --caramelo:#B97F4A;
  --terracota:#C56A44;
  --tijolo:#A55233;
  --argila:#8C4A2F;
  --cobre:#7A4A2E;
  --cacau:#5E3926;
  --cafe:#4A2E20;

  --terracota-claro:#DB9670;
  --tinta:#33261E;
  --tinta-suave:#6E5B4C;
  --linha:#E0D5C6;
  --ouro:#C9A961;
  --ouro-escuro:#9A7C3A;
  --erro:#A55233;
  --ok:#5A6247;
  --r:14px;
  --sombra:0 1px 2px rgba(51,38,30,.04), 0 8px 24px -12px rgba(51,38,30,.13);
  --sombra-alta:0 2px 4px rgba(51,38,30,.06), 0 20px 48px -16px rgba(51,38,30,.21);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--linho);
  color:var(--tinta);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
img{display:block;max-width:100%}
::selection{background:var(--terracota-claro);color:#fff}


/* ═══════════ TELÃO (TV do salão) ═══════════ */
.tv{position:fixed;inset:0;background:#241A14;color:#fff;
  display:flex;flex-direction:column;overflow:hidden}
.tv-top{display:flex;align-items:center;justify-content:center;gap:3vw;
  padding:2.4vh 3vw 1.8vh;border-bottom:1px solid rgba(255,255,255,.09);flex-shrink:0}
.tv-brasao{height:9vh;width:auto;filter:brightness(1.15)}
.tv-total{text-align:center}
.tv-total-l{font-size:1.7vh;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.42);margin-bottom:.5vh}
.tv-total-v{font-size:7vh;font-weight:600;color:var(--ouro);line-height:1}
.tv-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
.tv-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2vh 2.4vw;position:relative;transition:background .7s;
  border-right:1px solid rgba(255,255,255,.07)}
.tv-col:last-child{border-right:none}
.tv-col.noivo{background:radial-gradient(120% 90% at 50% 40%,rgba(90,98,71,.24),transparent 72%)}
.tv-col.noiva{background:radial-gradient(120% 90% at 50% 40%,rgba(197,106,68,.24),transparent 72%)}
.tv-col.lidera.noivo{background:radial-gradient(120% 90% at 50% 40%,rgba(90,98,71,.46),transparent 74%)}
.tv-col.lidera.noiva{background:radial-gradient(120% 90% at 50% 40%,rgba(197,106,68,.46),transparent 74%)}
.tv-cab{display:flex;align-items:center;gap:1.4vw;margin-bottom:1.6vh}
.tv-emoji{font-size:7.4vh;line-height:1}
.tv-nome{font-family:'Fraunces',serif;font-size:5.6vh;font-weight:400;line-height:1;
  font-variation-settings:"SOFT" 0,"WONK" 0}
.tv-item{font-size:1.6vh;letter-spacing:.24em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-top:.6vh}
.tv-coroa{margin-left:.6vw;padding:.7vh 1.3vw;border-radius:99px;
  background:var(--ouro);color:#241A14;font-size:1.5vh;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;animation:brilha 2.4s ease-in-out infinite}
@keyframes brilha{0%,100%{opacity:.85}50%{opacity:1}}
.tv-valor{
  font-weight:600;line-height:1;margin-bottom:2.4vh;
  letter-spacing:-.03em;font-variant-numeric:tabular-nums;white-space:nowrap;
  /* o tamanho vem do JS: quanto maior o número, menor a fonte (nunca estoura) */
}
.tv-col.noivo .tv-valor{color:#B7C09A}
.tv-col.noiva .tv-valor{color:#E8A886}
.tv-chamada{text-align:center;padding:2.6vh 1.8vw;border-radius:1.6vh;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);
  min-width:74%;transition:all .5s}
.tv-chamada.vazio{padding:1.8vh 1.8vw;background:rgba(255,255,255,.03);
  border-color:rgba(255,255,255,.07);min-width:60%}
.tv-chamada-l{font-size:3.2vh;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:1.2vh}
.tv-chamada-n{font-family:'Fraunces',serif;font-size:12vh;font-weight:400;
  line-height:1.06;font-variation-settings:"SOFT" 0,"WONK" 0;
  animation:chamando 1.9s ease-in-out infinite;
  overflow-wrap:break-word;hyphens:auto}
.tv-chamada-n.aguard{color:rgba(255,255,255,.22);font-size:5vh;
  animation:none;letter-spacing:.3em}
@keyframes chamando{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.045);opacity:.88}}
.tv-pulso{display:flex;justify-content:center;gap:.5vw;margin-top:1.4vh}
.tv-pulso span{width:1vh;height:1vh;border-radius:50%;background:var(--ouro);
  animation:pula 1.3s ease-in-out infinite}
.tv-pulso span:nth-child(2){animation-delay:.16s}
.tv-pulso span:nth-child(3){animation-delay:.32s}
@keyframes pula{0%,100%{opacity:.22;transform:translateY(0)}50%{opacity:1;transform:translateY(-.5vh)}}
.tv-ultimo{margin-top:3vh;font-size:4.2vh;color:rgba(255,255,255,.42);
  text-align:center;animation:surge .6s}
.tv-ultimo b{color:rgba(255,255,255,.85);font-weight:600}
.tv-cor{display:inline-block;animation:bate 2s ease-in-out infinite}
@keyframes bate{0%,100%{transform:scale(1)}18%{transform:scale(1.18)}36%{transform:scale(1)}
  54%{transform:scale(1.12)}72%{transform:scale(1)}}
@keyframes surge{from{opacity:0;transform:translateY(.8vh)}}
.tv-flash{position:fixed;inset:0;z-index:50;display:flex;align-items:center;
  justify-content:center;animation:flashIn .5s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(8px)}
.tv-flash.noivo{background:rgba(60,66,48,.94)}
.tv-flash.noiva{background:rgba(140,74,47,.94)}
@keyframes flashIn{from{opacity:0}}
.tv-flash-in{text-align:center;animation:estoura .75s cubic-bezier(.34,1.5,.5,1)}
@keyframes estoura{0%{transform:scale(.35);opacity:0}55%{transform:scale(1.09)}100%{transform:scale(1);opacity:1}}
.tv-flash-v{
  font-weight:700;line-height:1;color:#fff;white-space:nowrap;
  letter-spacing:-.03em;text-shadow:0 1vh 5vh rgba(0,0,0,.4);
  font-variant-numeric:tabular-nums;
}
.tv-flash-n{font-family:'Fraunces',serif;font-size:7vh;margin-top:2.4vh;
  color:rgba(255,255,255,.94);font-variation-settings:"SOFT" 0,"WONK" 0}
.tv-rodape{position:fixed;bottom:2.6vh;left:0;right:0;text-align:center;
  font-size:2.1vh;color:rgba(255,255,255,.26);letter-spacing:.1em}

/* ═══════════ BANDEJA (padrinho / madrinha) ═══════════ */
.bd{min-height:100vh;background:var(--linho);max-width:480px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.bd-top{padding:calc(16px + env(safe-area-inset-top,0px)) 20px 16px;
  color:#fff;position:sticky;top:0;z-index:10}
.bd-top.noivo{background:linear-gradient(150deg,#4C543C,#5A6247)}
.bd-top.noiva{background:linear-gradient(150deg,#A55233,#C56A44)}
.bd-quem{display:flex;align-items:center;gap:11px}
.bd-emoji{font-size:30px}
.bd-nome{font-family:'Fraunces',serif;font-size:20px;
  font-variation-settings:"SOFT" 0,"WONK" 0}
.bd-item{font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.62);margin-top:2px}
.bd-total{margin-left:auto;text-align:right}
.bd-total-l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.6)}
.bd-total-v{font-size:22px;font-weight:600;margin-top:1px}
.bd-b{padding:18px 20px 40px}
.bd-chamando{background:#fff;border:2px solid var(--terracota);border-radius:var(--r);
  padding:18px;margin-bottom:16px;text-align:center;box-shadow:var(--sombra-alta)}
.bd-chamando-l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--terracota);font-weight:700;margin-bottom:8px}
.bd-chamando-n{font-family:'Fraunces',serif;font-size:26px;color:var(--tinta);
  line-height:1.2;font-variation-settings:"SOFT" 0,"WONK" 0}
.bd-live{display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  font-size:10px;color:var(--erro);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.bd-live i{width:6px;height:6px;border-radius:50%;background:var(--erro);
  animation:piscar 1.1s infinite}
@keyframes piscar{0%,100%{opacity:1}50%{opacity:.2}}
.bd-vals{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.bd-v{padding:20px 12px;border-radius:13px;border:1px solid var(--linha);
  background:#fff;font-size:22px;font-weight:600;color:var(--tinta);
  transition:transform .1s,border-color .15s,background .15s}
.bd-v:active{transform:scale(.95)}
.bd-v.on{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.bd-outro{width:100%;padding:16px;border-radius:13px;border:1px solid var(--linha);
  background:#fff;font-size:20px;font-weight:600;text-align:center;
  color:var(--tinta);margin-bottom:14px}
.bd-outro:focus{outline:none;border-color:var(--oliva);box-shadow:0 0 0 3px rgba(90,98,71,.13)}
.bd-esc{display:flex;align-items:center;gap:10px;padding:13px 15px;
  border:1px solid var(--linha);border-radius:11px;background:#fff;
  margin-bottom:14px;cursor:pointer;font-size:13.5px}
.bd-esc.on{border-color:var(--terracota);background:#FDF6F2}
.bd-cx{width:22px;height:22px;border-radius:6px;border:2px solid var(--linha);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bd-esc.on .bd-cx{background:var(--terracota);border-color:var(--terracota);color:#fff}
.bd-lancar{width:100%;padding:20px;border-radius:14px;font-size:17px;font-weight:600;
  background:var(--terracota);color:#fff;box-shadow:0 6px 20px -8px rgba(197,106,68,.7);
  display:flex;align-items:center;justify-content:center;gap:9px}
.bd-lancar:disabled{opacity:.35;box-shadow:none}
.bd-lancar:not(:disabled):active{transform:scale(.98)}
.bd-hist{margin-top:26px}
.bd-h{display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--linha);font-size:13.5px}
.bd-h:last-child{border:none}
.bd-h-n{color:var(--tinta)}
.bd-h-n small{display:block;font-size:10.5px;color:var(--tinta-suave);margin-top:1px}
.bd-h-v{font-weight:600;color:var(--oliva);font-variant-numeric:tabular-nums}
.bd-undo{font-size:10.5px;color:var(--erro);margin-left:10px}


/* ═══════════ TELÃO — ENCERRAMENTO ═══════════ */
.fim{
  position:fixed;inset:0;overflow:auto;
  background:radial-gradient(140% 100% at 50% 0%,#3B2E24,#241A14 62%);
  color:#fff;display:flex;align-items:center;justify-content:center;
  animation:fimIn 1.6s ease;
}
@keyframes fimIn{from{opacity:0}}
.fim-luz{
  position:absolute;top:-30%;left:50%;transform:translateX(-50%);
  width:120vh;height:120vh;border-radius:50%;
  background:radial-gradient(circle,rgba(201,169,97,.16),transparent 62%);
  animation:respira 6s ease-in-out infinite;pointer-events:none;
}
@keyframes respira{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.07)}}
.fim-in{text-align:center;z-index:2;padding:4vh 4vw;max-width:92vw;
  display:flex;flex-direction:column;align-items:center;
  max-height:100vh;justify-content:center}
.fim-brasao{height:8.5vh;margin:0 auto 1.8vh;filter:brightness(1.2)
  drop-shadow(0 0 3vh rgba(201,169,97,.3));animation:desce 1.2s cubic-bezier(.22,1,.36,1)}
@keyframes desce{from{opacity:0;transform:translateY(-2vh)}}
.fim-l{
  font-size:2.2vh;letter-spacing:.34em;text-transform:uppercase;
  color:rgba(255,255,255,.42);margin-bottom:2vh;
  animation:desce 1.2s .2s backwards cubic-bezier(.22,1,.36,1);
}
.fim-v{
  font-weight:700;line-height:1;color:var(--ouro);white-space:nowrap;
  letter-spacing:-.03em;font-variant-numeric:tabular-nums;
  text-shadow:0 0 8vh rgba(201,169,97,.42);
  opacity:0;transform:scale(.7);
}
.fim-v.on{
  opacity:1;transform:scale(1);
  transition:opacity 1s, transform 1.3s cubic-bezier(.34,1.4,.5,1);
}
.fim-t{
  font-family:'Fraunces',serif;font-size:4.2vh;margin-top:2vh;
  color:rgba(255,255,255,.94);font-variation-settings:"SOFT" 0,"WONK" 0;
  animation:sobe 1.1s .3s backwards cubic-bezier(.22,1,.36,1);
}
@keyframes sobe{from{opacity:0;transform:translateY(2.4vh)}}

.fim-placar{
  display:flex;justify-content:center;gap:5vw;margin-top:3.5vh;
  animation:sobe 1s backwards cubic-bezier(.22,1,.36,1);
}
.fim-lado{
  display:flex;flex-direction:column;align-items:center;gap:.7vh;
  padding:2.2vh 3vw;border-radius:2vh;position:relative;
  border:1px solid rgba(255,255,255,.09);min-width:22vw;
}
.fim-lado.noivo{background:rgba(90,98,71,.16)}
.fim-lado.noiva{background:rgba(197,106,68,.16)}
.fim-lado.win{border-color:rgba(201,169,97,.5);
  box-shadow:0 0 5vh rgba(201,169,97,.16)}
.fim-lado-e{font-size:4.4vh}
.fim-lado-n{font-family:'Fraunces',serif;font-size:3.2vh;
  font-variation-settings:"SOFT" 0,"WONK" 0}
.fim-lado-v{font-size:4.4vh;font-weight:600;font-variant-numeric:tabular-nums}
.fim-lado.noivo .fim-lado-v{color:#B7C09A}
.fim-lado.noiva .fim-lado-v{color:#E8A886}
.fim-selo{
  position:absolute;bottom:-1.4vh;left:50%;transform:translateX(-50%);
  padding:.6vh 1.6vw;border-radius:99px;background:var(--ouro);color:#241A14;
  font-size:1.3vh;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;
}

.fim-ass{
  font-size:1.7vh;letter-spacing:.26em;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:3vh;
  animation:desce 1.2s .3s backwards cubic-bezier(.22,1,.36,1);
}

/* nomes: faixa rolante — altura FIXA, cabem 5 ou 500 nomes */
.fim-nomes{
  width:100%;margin-top:5vh;animation:sobe 1s .4s backwards;
}
.fim-nomes-l{
  font-size:1.9vh;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.32);margin-bottom:2vh;text-align:center;
}
.letr-wrap{display:flex;flex-direction:column;gap:.4vh}
.letr{position:relative;overflow:hidden;width:100%;height:5.4vh}
.letr-in{display:flex;width:max-content;animation:rola linear infinite}
.letr-in.volta{animation-name:rolaVolta}
@keyframes rola{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes rolaVolta{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.letr-faixa{display:flex;align-items:center;flex-shrink:0}
.letr-n{
  font-family:'Fraunces',serif;font-size:3vh;white-space:nowrap;
  color:rgba(255,255,255,.82);font-variation-settings:"SOFT" 0,"WONK" 0;
  padding:0 1.2vw;
}
.letr-n.anon{color:rgba(255,255,255,.4);font-style:italic;font-size:2.5vh}
.letr-d{color:var(--ouro);opacity:.42;font-size:1.5vh;flex-shrink:0}
.letr-fade{position:absolute;top:0;bottom:0;width:12vw;pointer-events:none;z-index:2}
.letr-fade.esq{left:0;background:linear-gradient(90deg,#2A1F17 12%,rgba(42,31,23,0))}
.letr-fade.dir{right:0;background:linear-gradient(270deg,#2A1F17 12%,rgba(42,31,23,0))}


/* ═══════════ ABERTURA ═══════════ */
.abr{position:fixed;inset:0;z-index:100;overflow:hidden;
  background:linear-gradient(165deg,#3B2E24,#241A14)}

/* envelope */
.env{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  animation:envSurge 1s ease}
@keyframes envSurge{from{opacity:0;transform:scale(.92)}}
.env-corpo{
  width:min(78vw,340px);aspect-ratio:1/.68;position:relative;
  background:linear-gradient(160deg,#5A6247,#4C543C);
  border-radius:8px;box-shadow:0 30px 70px -20px rgba(0,0,0,.6);
  transition:transform .5s;
}
.env:active .env-corpo{transform:scale(.98)}
.env-aba{
  position:absolute;top:0;left:0;right:0;height:64%;
  background:linear-gradient(160deg,#657059,#525a41);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;transition:transform 1.2s cubic-bezier(.5,0,.2,1);
  z-index:3;
}
.env-lacre{
  position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);
  width:74px;height:74px;border-radius:50%;z-index:4;
  background:radial-gradient(circle at 40% 35%,#E8C874,#C9A961 55%,#A8863C);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(0,0,0,.35),inset 0 2px 6px rgba(255,255,255,.4);
  transition:opacity .4s,transform .5s;
}
.env-brasao{width:54px;height:54px;filter:brightness(.45) sepia(.6) saturate(1.4);opacity:.9}
.env-txt{
  position:absolute;bottom:-46px;left:0;right:0;text-align:center;
  color:rgba(255,255,255,.6);font-size:13px;letter-spacing:.14em;
  text-transform:uppercase;animation:pisca 2.4s ease-in-out infinite;
}
@keyframes pisca{0%,100%{opacity:.5}50%{opacity:.9}}

/* abrindo: aba levanta, lacre some, tudo esvai */
.env.abrindo .env-aba{transform:rotateX(-172deg)}
.env.abrindo .env-lacre{opacity:0;transform:translate(-50%,-50%) scale(.5)}
.env.abrindo .env-txt{opacity:0}
.env.abrindo .env-corpo{
  animation:envSai 1.5s cubic-bezier(.5,0,.4,1) forwards;
}
@keyframes envSai{
  0%{transform:scale(1);opacity:1}
  55%{transform:scale(1.08)}
  100%{transform:scale(2.6);opacity:0}
}

/* capa */
.capa{position:absolute;inset:0;animation:capaSurge 1.2s ease}
@keyframes capaSurge{from{opacity:0}}
.capa-foto{
  position:absolute;inset:0;background-size:cover;background-position:center 22%;
}
.capa-grad{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(36,26,20,.15) 0%,
    rgba(36,26,20,.1) 32%,
    rgba(36,26,20,.55) 62%,
    rgba(36,26,20,.94) 100%);
}
.capa-conteudo{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:0 26px calc(30px + env(safe-area-inset-bottom,0)) 26px;
  text-align:center;
}
.capa-top{
  position:absolute;top:calc(26px + env(safe-area-inset-top,0));
  right:20px;display:flex;flex-direction:column;align-items:flex-end;
  animation:desceCapa 1.2s .3s backwards cubic-bezier(.22,1,.36,1);
}
.capa-brasao{width:112px;padding:22px;box-sizing:content-box;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
  background:radial-gradient(circle,rgba(20,14,10,.4) 0%,rgba(20,14,10,.18) 42%,transparent 68%);}
.capa-vers{
  font-family:'Fraunces',serif;font-size:14px;font-style:italic;
  color:rgba(255,255,255,.95);line-height:1.55;max-width:320px;margin-top:20px;
  text-shadow:0 1px 10px rgba(0,0,0,.7);font-variation-settings:"SOFT" 0,"WONK" 0;
}
.capa-vers-ref{display:block;font-style:normal;font-size:10.5px;
  letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.72);
  margin-top:7px;font-family:'Inter',sans-serif}
.capa-nomes{
  font-size:50px;color:#fff;line-height:.94;margin-top:auto;margin-bottom:18px;
  text-shadow:0 3px 20px rgba(0,0,0,.7),0 1px 4px rgba(0,0,0,.5);
  animation:sobeCapa 1.1s .5s backwards cubic-bezier(.22,1,.36,1);
}

/* player */
.capa-musica{
  display:inline-flex;align-items:center;gap:11px;
  padding:11px 20px 11px 13px;border-radius:99px;margin-bottom:26px;
  background:rgba(255,255,255,.14);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.24);color:#fff;
  animation:sobeCapa 1.1s .7s backwards;transition:background .25s;
}
.capa-musica.on{background:rgba(201,169,97,.28);border-color:rgba(201,169,97,.5)}
.capa-mus-ic{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:#fff;color:#33261E;display:flex;align-items:center;justify-content:center}
.capa-ondas{display:flex;align-items:center;gap:3px;height:18px}
.capa-ondas span{width:3px;height:5px;border-radius:2px;background:rgba(255,255,255,.5);
  transition:height .2s}
.capa-ondas.ativo span{animation:onda .9s ease-in-out infinite}
.capa-ondas.ativo span:nth-child(1){animation-delay:0s}
.capa-ondas.ativo span:nth-child(2){animation-delay:.15s}
.capa-ondas.ativo span:nth-child(3){animation-delay:.3s}
.capa-ondas.ativo span:nth-child(4){animation-delay:.15s}
.capa-ondas.ativo span:nth-child(5){animation-delay:0s}
@keyframes onda{0%,100%{height:5px}50%{height:17px}}
.capa-mus-txt{font-size:13.5px;font-weight:500;letter-spacing:.02em}

/* contagem na capa */
.cap-cont{display:flex;gap:14px;margin-bottom:28px;
  animation:sobeCapa 1.1s .9s backwards}
.cap-cont-bloco{display:flex;flex-direction:column;align-items:center;
  min-width:54px;padding:12px 8px;border-radius:14px;
  background:rgba(255,255,255,.12);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.18)}
.cap-cont-n{font-size:28px;font-weight:600;color:#fff;line-height:1;
  font-variant-numeric:tabular-nums}
.cap-cont-l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.65);margin-top:5px}
.cap-cont-hoje{font-family:'Fraunces',serif;font-size:30px;color:var(--ouro);
  text-shadow:0 2px 16px rgba(0,0,0,.4)}

.capa-entrar{
  display:inline-flex;align-items:center;gap:9px;
  padding:15px 34px;border-radius:99px;
  background:#fff;color:#33261E;font-size:15px;font-weight:600;
  box-shadow:0 8px 28px -8px rgba(0,0,0,.5);
  animation:sobeCapa 1.1s 1.1s backwards;transition:transform .15s;
}
.capa-entrar:active{transform:scale(.96)}
@keyframes desceCapa{from{opacity:0;transform:translateY(-16px)}}
@keyframes sobeCapa{from{opacity:0;transform:translateY(20px)}}

/* ══ tipografia ══ */
.script{font-family:'Parisienne',cursive}
.display{
  font-family:'Fraunces',Georgia,serif;font-weight:400;
  letter-spacing:-.01em;line-height:1.1;
  /* WONK 0 desliga os glifos alternativos do Fraunces (o "J" e o "ss"
     de Jessika saíam com desenhos decorativos que pareciam dobrados) */
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;
  -webkit-font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"hlig" 0,"calt" 0;
  font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"hlig" 0,"calt" 0;
}
.display-i{
  font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:300;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;
  font-feature-settings:"liga" 0,"clig" 0,"dlig" 0;
}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--oliva-claro);
}

/* ══ layout base ══ */
.shell{max-width:560px;margin:0 auto;min-height:100vh;background:var(--linho);position:relative;
  padding-bottom:calc(76px + env(safe-area-inset-bottom,0px));}
.pad{padding:0 20px}

/* ══ nav inferior ══ */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;z-index:80;
  background:rgba(251,248,243,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--linha);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-b{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:11px 2px 9px;color:var(--tinta-suave);position:relative;transition:color .18s;
}
.nav-b.on{color:var(--oliva)}
.nav-b.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:22px;height:2px;background:var(--terracota);border-radius:0 0 3px 3px;
}
.nav-b svg{width:20px;height:20px;stroke-width:1.6}
.nav-b span{font-size:9.5px;font-weight:500;letter-spacing:.02em}
.nav-dot{
  position:absolute;top:8px;right:calc(50% - 18px);
  width:6px;height:6px;border-radius:50%;background:var(--terracota);
}

/* ══ hero ══ */
.hero{
  padding:56px 20px 36px;text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(178deg,var(--papel) 0%,var(--linho) 100%);
  border-bottom:1px solid var(--linha);
}
.hero-mono{
  font-size:11px;letter-spacing:.32em;color:var(--oliva-claro);margin-bottom:26px;
  font-weight:500;
}
.hero-nomes{
  font-size:clamp(38px,11vw,52px);color:var(--tinta);margin:0;line-height:1.02;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
}
.hero-e{
  display:block;font-size:.46em;color:var(--terracota);margin:6px 0;
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
}
.hero-rule{
  width:44px;height:1px;background:var(--linha);margin:26px auto 20px;position:relative;
}
.hero-rule::after{
  content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:5px;height:5px;background:var(--terracota);
}
.hero-data{font-size:13px;color:var(--tinta-suave);letter-spacing:.04em;line-height:1.7}
.hero-data b{color:var(--tinta);font-weight:500}

/* ══ contador ══ */
.cd{display:flex;justify-content:center;gap:10px;margin-top:28px}
.cd-i{min-width:62px;text-align:center;padding:14px 8px;border-radius:15px;
  background:linear-gradient(160deg,#fff,var(--papel));
  border:1px solid var(--linha);box-shadow:var(--sombra)}
.cd-n{font-size:29px;font-weight:600;color:var(--oliva);line-height:1;
  font-variant-numeric:tabular-nums}
.cd-l{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tinta-suave);margin-top:5px}
.cd-s{align-self:center;color:var(--linha);font-size:16px;padding-bottom:12px}

/* ══ cards ══ */
.card{
  background:#fff;border:1px solid var(--linha);border-radius:var(--r);
  box-shadow:var(--sombra);overflow:hidden;
}
.sec{padding:34px 0 8px}
.sec-t{font-size:23px;margin:0 0 5px}
.sec-d{font-size:13.5px;color:var(--tinta-suave);line-height:1.6;margin:0 0 20px}

/* ══ botões ══ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 20px;border-radius:11px;
  font-size:14.5px;font-weight:500;letter-spacing:.01em;
  transition:transform .12s,box-shadow .2s,background .2s;
}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none}
.btn-p{background:var(--oliva);color:#fff;box-shadow:0 4px 14px -6px rgba(90,98,71,.55)}
.btn-p:not(:disabled):hover{background:#4C543C}
.btn-t{background:var(--terracota);color:#fff;box-shadow:0 4px 14px -6px rgba(197,106,68,.5)}
.btn-t:not(:disabled):hover{background:var(--tijolo)}
.btn-o{background:transparent;color:var(--oliva);border:1px solid var(--linha)}
.btn-o:hover{background:var(--papel);border-color:var(--oliva-claro)}
.btn-g{background:var(--papel);color:var(--tinta)}
.btn-sm{padding:10px 15px;font-size:13px;width:auto;border-radius:9px}

/* ══ inputs ══ */
.fld{margin-bottom:15px}
.fld label{display:block;font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--tinta-suave);margin-bottom:7px}
.inp{
  width:100%;padding:13px 15px;border:1px solid var(--linha);border-radius:10px;
  background:#fff;color:var(--tinta);transition:border-color .18s,box-shadow .18s;
}
.inp:focus{outline:none;border-color:var(--oliva-claro);box-shadow:0 0 0 3px rgba(139,145,116,.13)}
.inp::placeholder{color:#B8AFA1}
textarea.inp{resize:none;line-height:1.5}

/* ══ portão de entrada ══ */
.gate{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:32px 24px;max-width:440px;margin:0 auto;
  background:linear-gradient(172deg,var(--papel) 0%,var(--linho) 62%);
}
.brasao{
  display:block;margin:0 auto;
  filter:drop-shadow(0 3px 10px rgba(51,38,30,.09));
}
.gate-mark{text-align:center;margin-bottom:34px}
.gate-mono{font-size:10px;letter-spacing:.34em;color:var(--oliva-claro);margin-bottom:20px;font-weight:600}
.gate-nomes{
  font-size:40px;line-height:1.05;color:var(--tinta);margin:0;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
}
.gate-e{color:var(--terracota);font-family:'Fraunces',serif;font-style:italic;font-weight:300}
.gate-sub{font-size:12.5px;color:var(--tinta-suave);margin-top:16px;letter-spacing:.05em}

/* ══ PRESENTES ══ */
.termo{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;
  background:#fff;box-shadow:var(--sombra);margin-bottom:26px;
}
.termo-top{
  padding:22px 20px 18px;
  background:linear-gradient(145deg,#4C543C,#5A6247);
  color:#fff;
}
.termo-eyebrow{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.62);font-weight:600;margin-bottom:9px}
.termo-t{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin:0 0 4px;line-height:1.15}
.termo-sub{font-size:12px;color:rgba(255,255,255,.72);line-height:1.5}
.termo-bar-wrap{padding:18px 20px 20px;background:#fff}
.termo-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.termo-val{font-size:19px;font-weight:600;color:var(--oliva)}
.termo-alvo{font-size:12px;color:var(--tinta-suave)}
.termo-bar{height:7px;background:var(--papel);border-radius:99px;overflow:hidden}
.termo-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--oliva-claro),var(--oliva));
  transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.termo-pct{font-size:11px;color:var(--tinta-suave);margin-top:9px;text-align:right;letter-spacing:.03em}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.pres{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;background:#fff;
  cursor:pointer;transition:transform .16s,box-shadow .22s,border-color .18s;
  position:relative;display:flex;flex-direction:column;
}
.pres:active{transform:scale(.982)}
.pres.sel{border-color:var(--terracota);box-shadow:0 0 0 2px rgba(197,106,68,.18),var(--sombra)}

.pres-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--papel)}
.pres-b{padding:11px 12px 13px;display:flex;flex-direction:column;flex:1}
.pres-n{font-size:12.5px;font-weight:500;line-height:1.32;margin-bottom:auto;color:var(--tinta)}
.pres-v{font-size:14px;font-weight:600;color:var(--terracota);margin-top:9px}
.pres-v small{font-size:10px;font-weight:400;color:var(--tinta-suave);display:block;margin-top:2px}
.pres-chk{
  position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;
  background:var(--terracota);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.pres-tag{
  position:absolute;top:9px;left:9px;padding:3px 8px;border-radius:99px;
  font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(51,38,30,.74);color:#fff;backdrop-filter:blur(4px);
}
.paleta{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border-radius:11px;overflow:hidden;border:1px solid var(--linha);
}
.paleta-c{
  aspect-ratio:1/1.15;display:flex;flex-direction:column;justify-content:flex-end;
  padding:7px 6px;cursor:pointer;transition:transform .14s;
}
.paleta-c:active{transform:scale(.96)}
.paleta-n{font-size:9.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-h{font-size:8.5px;color:rgba(255,255,255,.78);margin-top:1px;
  font-family:'JetBrains Mono',monospace;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-c.claro .paleta-n{color:#4A2E20;text-shadow:none}
.paleta-c.claro .paleta-h{color:rgba(74,46,32,.62);text-shadow:none}

.contador{
  display:flex;align-items:center;justify-content:center;gap:20px;
  background:#fff;border:1px solid var(--linha);border-radius:13px;padding:14px;
}
.cont-b{
  width:44px;height:44px;border-radius:50%;background:var(--papel);
  font-size:22px;font-weight:500;color:var(--tinta);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s;
}
.cont-b:not(:disabled):hover{background:var(--linha)}
.cont-b:not(:disabled):active{transform:scale(.92)}
.cont-b:disabled{opacity:.32;cursor:not-allowed}
.cont-v{min-width:74px;text-align:center}
.cont-n{font-size:30px;font-weight:600;color:var(--oliva);line-height:1}
.cont-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--tinta-suave);margin-top:4px}

.ess{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;background:#fff;
  cursor:pointer;transition:transform .16s,box-shadow .22s,border-color .18s;
  position:relative;display:flex;gap:0;margin-bottom:11px;box-shadow:var(--sombra);
}
.ess:active{transform:scale(.988)}
.ess.sel{border-color:var(--terracota);box-shadow:0 0 0 2px rgba(197,106,68,.18),var(--sombra)}
.ess.full{opacity:.62;pointer-events:none}
.ess-img{width:104px;flex-shrink:0;object-fit:cover;background:var(--papel)}
.ess-b{padding:12px 13px;flex:1;min-width:0;display:flex;flex-direction:column}
.ess-n{font-size:14px;font-weight:600;color:var(--tinta);line-height:1.25}
.ess-s{font-size:11px;color:var(--tinta-suave);margin-top:2px;line-height:1.4}
.ess-bar{height:5px;background:var(--papel);border-radius:99px;overflow:hidden;margin-top:10px}
.ess-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);
  background:linear-gradient(90deg,var(--camel),var(--terracota))}
.ess-f{display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;gap:8px}
.ess-c{font-size:10.5px;color:var(--tinta-suave);letter-spacing:.02em}
.ess-v{font-size:13.5px;font-weight:600;color:var(--terracota);white-space:nowrap}
.ess-v small{font-weight:400;color:var(--tinta-suave);font-size:9.5px}
.ess-tag{
  position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:99px;
  font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  background:var(--oliva);color:#fff;
}
.ess-tag.esp{background:var(--ouro);color:#33261E}
.sub-t{
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--tinta-suave);margin:26px 0 12px;display:flex;align-items:center;gap:10px;
}
.sub-t::after{content:'';flex:1;height:1px;background:var(--linha)}

.cart-val{
  background:linear-gradient(150deg,#FDF6F2,#F8EDE5);
  border:2px solid var(--terracota);border-radius:var(--r);
  padding:20px 18px;text-align:center;margin-bottom:16px;
}
.cart-val-l{
  font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--terracota);margin-bottom:8px;
}
.cart-val-v{
  font-size:34px;font-weight:700;color:var(--tinta);line-height:1;
  letter-spacing:-.02em;margin-bottom:14px;
}
.cart-val-b{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:99px;
  background:var(--terracota);color:#fff;
  font-size:12.5px;font-weight:600;
  transition:transform .12s;
}
.cart-val-b:active{transform:scale(.95)}

.local-arte{
  border-radius:var(--r);overflow:hidden;margin-bottom:20px;
  box-shadow:var(--sombra);background:var(--papel);
}
.local-arte img{width:100%;display:block}


/* botão flutuante dos noivos → painel de presentes */
.conf-btn{
  width:100%;display:flex;align-items:center;gap:13px;
  padding:15px 17px;border-radius:15px;margin-bottom:22px;
  background:#fff;border:1px solid var(--linha);box-shadow:var(--sombra);
  text-align:left;transition:transform .12s,border-color .18s;
}
.conf-btn:active{transform:scale(.99)}
.conf-btn.tem{border-color:var(--terracota);background:#FDF6F2}
.conf-ic{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:var(--papel);color:var(--oliva);
  display:flex;align-items:center;justify-content:center;
}
.conf-btn.tem .conf-ic{background:var(--terracota);color:#fff}
.conf-txt{flex:1;min-width:0}
.conf-t{font-size:14.5px;font-weight:600;color:var(--tinta)}
.conf-d{font-size:12px;color:var(--tinta-suave);margin-top:2px}
.conf-btn.tem .conf-d{color:var(--terracota);font-weight:500}
.conf-badge{
  min-width:26px;height:26px;padding:0 8px;border-radius:99px;flex-shrink:0;
  background:var(--terracota);color:#fff;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  animation:pulseBadge 2s ease-in-out infinite;
}

.fab-noivos{
  position:fixed;right:16px;bottom:calc(80px + env(safe-area-inset-bottom,0));
  z-index:60;display:inline-flex;align-items:center;gap:8px;
  padding:13px 20px;border-radius:99px;
  background:linear-gradient(150deg,#5A6247,#4C543C);color:#fff;
  font-size:14px;font-weight:600;
  box-shadow:0 8px 24px -6px rgba(76,84,60,.6);
  animation:fabSurge .5s cubic-bezier(.34,1.4,.5,1);transition:transform .15s;
}
.fab-noivos:active{transform:scale(.95)}
.fab-noivos svg{flex-shrink:0}
@keyframes fabSurge{from{opacity:0;transform:scale(.6) translateY(10px)}}
.fab-badge{
  min-width:22px;height:22px;padding:0 6px;border-radius:99px;
  background:var(--terracota);color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-left:2px;box-shadow:0 2px 6px rgba(0,0,0,.2);
  animation:pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

.social{
  display:flex;align-items:center;gap:4px;margin-top:7px;
  font-size:9.5px;color:var(--oliva-claro);letter-spacing:.02em;
}
.social svg{flex-shrink:0;stroke-width:2}
.social.social-1{color:var(--oliva)}

.especial{
  grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:15px;
  border:1px solid var(--ouro);border-radius:var(--r);background:linear-gradient(120deg,#FDFBF6,#F8F2E4);
  cursor:pointer;transition:transform .16s,box-shadow .2s;position:relative;
}
.especial:active{transform:scale(.985)}
.especial.sel{box-shadow:0 0 0 2px rgba(201,169,97,.35)}
.especial-ic{
  width:40px;height:40px;border-radius:11px;background:var(--ouro);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.especial-t{font-size:13.5px;font-weight:600;color:var(--tinta)}
.especial-d{font-size:11px;color:var(--tinta-suave);margin-top:2px;line-height:1.4}
.especial-v{margin-left:auto;font-size:15px;font-weight:600;color:#9A7C3A;flex-shrink:0}

/* ══ carrinho flutuante ══ */
.cart{
  position:fixed;bottom:calc(76px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:528px;z-index:70;
  background:var(--tinta);color:#fff;border-radius:13px;padding:13px 16px;
  display:flex;align-items:center;gap:13px;
  box-shadow:0 12px 32px -8px rgba(51,38,30,.44);
  animation:up .3s cubic-bezier(.22,1,.36,1);
}
@keyframes up{from{opacity:0;transform:translateX(-50%) translateY(14px)}}
.cart-i{flex:1;min-width:0}
.cart-c{font-size:10.5px;color:rgba(255,255,255,.6);letter-spacing:.05em}
.cart-v{font-size:19px;font-weight:600;margin-top:1px}
.cart-b{
  background:var(--terracota);color:#fff;padding:11px 18px;border-radius:9px;
  font-size:13.5px;font-weight:600;flex-shrink:0;
}

/* ══ modal ══ */
.ov{
  position:fixed;inset:0;background:rgba(51,38,30,.52);backdrop-filter:blur(3px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  animation:fade .22s;
}
@keyframes fade{from{opacity:0}}
.mod{
  background:var(--linho);width:100%;max-width:560px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  animation:slide .32s cubic-bezier(.22,1,.36,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
@keyframes slide{from{transform:translateY(100%)}}
.mod-h{
  padding:18px 20px 14px;border-bottom:1px solid var(--linha);
  display:flex;align-items:center;justify-content:between;gap:12px;
  position:sticky;top:0;background:var(--linho);z-index:2;
}
.mod-t{font-family:'Fraunces',serif;font-size:19px;font-weight:400;flex:1}
.mod-x{width:32px;height:32px;border-radius:50%;background:var(--papel);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tinta-suave)}
.mod-b{padding:20px}
.grab{width:34px;height:4px;background:var(--linha);border-radius:99px;margin:9px auto 0}

/* ══ pix ══ */
.qr-box{
  background:#fff;padding:18px;border-radius:var(--r);border:1px solid var(--linha);
  display:flex;justify-content:center;margin-bottom:16px;
}
.pix-code{
  background:#fff;border:1px solid var(--linha);border-radius:10px;padding:12px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.5;
  color:var(--tinta-suave);word-break:break-all;max-height:88px;overflow-y:auto;
  margin-bottom:10px;
}
.tot-box{
  background:var(--papel);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;
}
.tot-l{display:flex;justify-content:space-between;font-size:12.5px;
  color:var(--tinta-suave);padding:4px 0;line-height:1.5}
.tot-l b{color:var(--tinta);font-weight:500;text-align:right}
.tot-f{display:flex;justify-content:space-between;align-items:baseline;
  padding-top:12px;margin-top:10px;border-top:1px solid var(--linha)}
.tot-f span{font-size:12px;color:var(--tinta-suave)}
.tot-f b{font-size:22px;font-weight:600;color:var(--oliva)}

/* ══ chat ══ */
.chat-w{display:flex;flex-direction:column;height:calc(100vh - 76px - env(safe-area-inset-bottom,0px))}
.avisos{padding:12px 16px 0;flex-shrink:0}
.aviso-pub{
  display:flex;gap:9px;padding:10px 13px;border-radius:10px;margin-bottom:8px;
  background:var(--papel);border:1px solid var(--linha);
  font-size:11.5px;line-height:1.5;color:var(--tinta-suave);
}
.aviso-pub svg{color:var(--oliva-claro)}
.aviso-pub b{color:var(--tinta);font-weight:600}

.aviso{
  display:flex;gap:11px;padding:12px 14px;border-radius:11px;margin-bottom:8px;
  background:linear-gradient(120deg,#FDFBF6,#F8F2E4);border:1px solid var(--ouro);
}
.aviso-ic{color:var(--ouro);flex-shrink:0;margin-top:1px}
.aviso-t{font-size:12.5px;line-height:1.5;color:var(--tinta)}
.aviso-t b{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:#9A7C3A;margin-bottom:3px;font-weight:600}
.msgs{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;max-width:88%;align-items:flex-end}
.msg.eu{align-self:flex-end;flex-direction:row-reverse}
.av{
  width:29px;height:29px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;
}
.bub{
  padding:9px 13px;border-radius:15px;font-size:14px;line-height:1.45;
  background:#fff;border:1px solid var(--linha);position:relative;
}
.msg.eu .bub{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.bub-n{font-size:10.5px;font-weight:600;color:var(--oliva);margin-bottom:2px}
.bub-h{font-size:9.5px;color:var(--tinta-suave);margin-top:3px;text-align:right;opacity:.8}
.msg.eu .bub-h{color:rgba(255,255,255,.65)}
.chat-in{
  display:flex;gap:8px;padding:11px 16px;border-top:1px solid var(--linha);
  background:var(--linho);flex-shrink:0;align-items:flex-end;
}
.chat-in .inp{border-radius:20px;padding:11px 15px;max-height:96px}
.chat-s{
  width:42px;height:42px;border-radius:50%;background:var(--oliva);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-s:disabled{opacity:.35}
.del-m{opacity:0;transition:opacity .16s;font-size:10px;color:var(--erro);
  padding:0 5px;align-self:center}
.msg:hover .del-m{opacity:1}

/* ══ galeria ══ */
.gal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.gal-i{
  aspect-ratio:1;object-fit:cover;width:100%;background:var(--papel);
  cursor:pointer;transition:opacity .18s;position:relative;
}
.gal-i:active{opacity:.75}
.gal-cell{position:relative;cursor:pointer}
.gal-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(46,42,36,.28);color:#fff;pointer-events:none;
}
.gal-au{
  position:absolute;bottom:4px;left:5px;font-size:9px;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.7);pointer-events:none;font-weight:500;
}
.up-limites{
  text-align:center;font-size:11.5px;color:var(--tinta-suave);
  margin-top:11px;line-height:1.6;
}
.up-erro{
  display:flex;align-items:flex-start;gap:10px;margin-top:12px;
  padding:13px 15px;border-radius:12px;
  background:#FDF0E8;border:1px solid #F0C9B5;
  font-size:13px;line-height:1.5;color:#A5482F;
}
.up-erro svg{flex-shrink:0;margin-top:1px;color:var(--terracota)}
.up-erro-x{flex-shrink:0;color:#A5482F;opacity:.6;padding:2px}
.up-dica{
  text-align:center;font-size:11.5px;color:var(--tinta-suave);
  margin-top:10px;line-height:1.5;
}
.up-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:22px;border:1.5px dashed var(--linha);border-radius:var(--r);
  background:#fff;color:var(--oliva);font-size:14px;font-weight:500;
  width:100%;transition:border-color .18s,background .18s;margin-bottom:18px;
}
.up-btn:hover{border-color:var(--oliva-claro);background:var(--papel)}
.lb{
  position:fixed;inset:0;background:rgba(20,18,15,.94);z-index:300;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  animation:fade .2s;
}
.lb img,.lb video{max-width:100%;max-height:84vh;object-fit:contain}
.lb-x{position:absolute;top:calc(14px + env(safe-area-inset-top,0px));right:16px;
  width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.14);
  color:#fff;display:flex;align-items:center;justify-content:center;z-index:2}
.lb-i{position:absolute;bottom:calc(22px + env(safe-area-inset-bottom,0px));left:0;right:0;
  text-align:center;color:rgba(255,255,255,.8);font-size:12.5px}

/* ══ local ══ */
.mapa{width:100%;aspect-ratio:16/10;border:0;display:block;background:var(--papel)}
.info-l{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--linha)}
.info-l:last-child{border-bottom:none}
.info-ic{
  width:36px;height:36px;border-radius:10px;background:var(--papel);color:var(--oliva);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.info-t{font-size:10px;letter-spacing:.11em;text-transform:uppercase;
  color:var(--tinta-suave);font-weight:600;margin-bottom:3px}
.info-v{font-size:14px;color:var(--tinta);line-height:1.5}
.info-v a{color:var(--terracota);text-decoration:none;font-weight:500}

/* ══ diversos ══ */
.vazio{text-align:center;padding:52px 24px;color:var(--tinta-suave)}
.vazio-ic{color:var(--linha);margin-bottom:14px}
.vazio-t{font-family:'Fraunces',serif;font-size:17px;color:var(--tinta);margin-bottom:6px}
.vazio-d{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}
.spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.spin.esc{border-color:var(--linha);border-top-color:var(--oliva)}
.toast{
  position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0px));left:50%;
  transform:translateX(-50%);background:var(--tinta);color:#fff;
  padding:11px 20px;border-radius:99px;font-size:13px;z-index:400;
  box-shadow:var(--sombra-alta);animation:up .3s;max-width:88%;text-align:center;
}
.grat{text-align:center;padding:20px 6px}
.grat-ic{
  width:62px;height:62px;border-radius:50%;background:var(--oliva);color:#fff;
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  animation:pop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(0);opacity:0}}
.grat-t{font-family:'Fraunces',serif;font-size:25px;margin-bottom:11px;line-height:1.2}
.grat-d{font-size:14px;color:var(--tinta-suave);line-height:1.65;margin-bottom:20px}
.grat-l{
  background:var(--papel);border-radius:var(--r);padding:15px;text-align:left;margin-bottom:20px;
}
.grat-li{font-size:13px;padding:4px 0;color:var(--tinta);display:flex;gap:8px}
.grat-li svg{color:var(--oliva);flex-shrink:0;margin-top:2px}
.admin-tag{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;
  background:var(--tinta);color:#fff;font-size:9.5px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.tab{padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:500;
  border:1px solid var(--linha);color:var(--tinta-suave);white-space:nowrap;background:#fff}
.tab.on{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.ped{padding:14px;border-bottom:1px solid var(--linha);display:flex;gap:12px;align-items:flex-start}
.ped:last-child{border-bottom:none}
.ped-i{flex:1;min-width:0}
.ped-n{font-size:14px;font-weight:500}
.ped-d{font-size:11.5px;color:var(--tinta-suave);margin-top:3px;line-height:1.5}
.ped-v{font-size:15px;font-weight:600;color:var(--oliva);white-space:nowrap}
.badge{padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;display:inline-block;margin-top:5px}
.badge.pend{background:#FBF0E4;color:#9A6A2A}
.badge.conf{background:#EAEEE3;color:var(--oliva)}
@media(max-width:360px){.grid{gap:10px}.pres-n{font-size:11.5px}}
</style>

  if(d.length===11) return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  if(d.length===10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return t;
};
const mascaraFone = t => {
  const d = soDigitos(t).slice(0,11);
  if(d.length<=2) return d;
  if(d.length<=6) return '('+d.slice(0,2)+') '+d.slice(2);
  if(d.length<=10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
};
const iniciais = n => n.trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase();
const corDe = s => {
  const p=['#5A6247','#C56A44','#8B9174','#B97F4A','#7A4A2E','#A55233','#8C4A2F','#C9A961'];
  let x=0; for(const c of s) x=(x*31+c.charCodeAt(0))>>>0;
  return p[x%p.length];
};
/* Tamanho de fonte que cabe: encolhe conforme o número cresce.
   maxVh = tamanho ideal · chars = quantos caracteres · porLinha = quantos cabem */
const cabe = (txt, maxVh, porLinha) => {
  const n = String(txt).length;
  const vh = n <= porLinha ? maxVh : maxVh * (porLinha / n);
  return vh.toFixed(2)+'vh';
};

const hora = ts => {
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
};

/* ── BR Code Pix (EMV) ── */
function pixBRCode(valor, txid='***'){
  const f=(id,v)=>id+String(v.length).padStart(2,'0')+v;
  const norm=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 $%*+\-./:]/g,'').toUpperCase();
  const mai=f('00','BR.GOV.BCB.PIX')+f('01',PIX.chave);
  let p='';
  p+=f('00','01');
  p+=f('26',mai);
  p+=f('52','0000');
  p+=f('53','986');
  if(valor>0) p+=f('54',valor.toFixed(2));
  p+=f('58','BR');
  p+=f('59',norm(PIX.nome).slice(0,25));
  p+=f('60',norm(PIX.cidade).slice(0,15));
  p+=f('62',f('05',txid.slice(0,25)));
  p+='6304';
  // CRC16-CCITT
  let crc=0xFFFF;
  for(let i=0;i<p.length;i++){
    crc^=p.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc = (crc&0x8000) ? ((crc<<1)^0x1021)&0xFFFF : (crc<<1)&0xFFFF;
  }
  return p+crc.toString(16).toUpperCase().padStart(4,'0');
}

/* ═════════════ APP ═════════════ */
function App(){
  const [uid,setUid] = useState(null);
  const [eu,setEu]   = useState(null);
  const [aba,setAbaRaw] = useState('casa');
  // Ao trocar de aba, sempre volta ao topo (senão a nova aba abre
  // na posição de rolagem da anterior, escondendo a introdução).
  const setAba = (nova) => {
    setAbaRaw(nova);
    requestAnimationFrame(()=>{
      window.scrollTo({top:0,behavior:'instant'});
      document.querySelector('.shell')?.scrollTo?.({top:0});
    });
  };
  const [toast,setToast] = useState('');
  const [admin,setAdmin] = useState(false);
  const [forcarLogin,setForcarLogin] = useState(false);
  const [painelApp,setPainelApp] = useState(false);   // painel dos noivos (botão flutuante)

  const [pedidos,setPedidos] = useState([]);
  const [msgs,setMsgs]       = useState([]);
  const [midias,setMidias]   = useState([]);
  const [avisos,setAvisos]   = useState([]);
  const [convidados,setConvidados] = useState([]);   // para o RSVP (painel dos noivos)

  const aviso = useCallback(t=>{setToast(t);setTimeout(()=>setToast(''),2600)},[]);

  // Fluxo de autenticação. Um único ponto de decisão — sem corrida.
  //   URL termina em #noivos  → NÃO cria sessão anônima; mostra o login por e-mail.
  //   Sem #noivos             → convidado entra anônimo, como sempre.
  useEffect(()=>{
    const querNoivos = ()=> location.hash.toLowerCase()==='#noivos';

    // Se um convidado anônimo pediu #noivos, derruba a sessão dele primeiro.
    const u0 = auth.currentUser;
    if(querNoivos() && u0 && u0.isAnonymous) signOut(auth);

    const un = onAuthStateChanged(auth, async u=>{
      // ── ninguém logado ──
      if(!u){
        if(querNoivos()){                 // quer o login dos noivos: não cria anônimo
          setUid(null); setAdmin(false);
          setForcarLogin(true); setEu(false);
          return;
        }
        try{ await signInAnonymously(auth); }
        catch(e){ console.error(e); }
        return;
      }

      // ── convidado anônimo, mas a URL pede noivos: derruba ──
      if(u.isAnonymous && querNoivos()){ await signOut(auth); return; }

      const ehNoivo = NOIVOS_UID.includes(u.uid);

      // ── e-mail que NÃO está na lista de noivos: não é admin, barra ──
      if(!u.isAnonymous && !ehNoivo){
        await signOut(auth);
        setForcarLogin(true); setEu(false);
        return;
      }

      setUid(u.uid);
      setAdmin(ehNoivo);
      setForcarLogin(false);
      if(location.hash) history.replaceState(null,'',location.pathname);

      // A identidade é o TELEFONE, não o uid do navegador.
      // O uid só serve para lembrar quem é neste aparelho.
      const fone = ehNoivo
        ? (CASAMENTO.fones[u.email?.toLowerCase()] || '')
        : localStorage.getItem(LSK+'_fone');

      if(fone){
        const snap = await getDoc(doc(db,C.convidados,fone));
        if(snap.exists()){
          setEu({fone, uid:u.uid, ...snap.data(), noivo:ehNoivo});
          return;
        }
      }

      if(ehNoivo){
        // anfitrião logou por e-mail: cria/garante a ficha pelo telefone dele
        const email = (u.email||'').toLowerCase();
        const fichaAnf = CONFIG.infra.anfitrioes[email];
        const nome = fichaAnf ? fichaAnf.nome : (CONFIG.evento.nomeA || 'Anfitrião');
        const f = CASAMENTO.fones[email] || (fichaAnf && fichaAnf.fone) || chaveFone(CASAMENTO.whatsapp);
        const dado = {nome, em:serverTimestamp()};
        await setDoc(doc(db,C.convidados,f), dado, {merge:true});
        localStorage.setItem(LSK+'_fone', f);
        setEu({fone:f, uid:u.uid, ...dado, noivo:true});
        return;
      }

      setEu(false);   // convidado novo (ou aparelho novo): vai para o Gate
    });

    // trocar o hash na barra de endereço recarrega o app no modo certo
    const onHash = ()=> location.reload();
    window.addEventListener('hashchange', onHash);
    return ()=>{ un(); window.removeEventListener('hashchange', onHash); };
  },[]);

  useEffect(()=>{
    if(!uid) return;
    const un=[];
    un.push(onSnapshot(collection(db,C.pedidos),s=>
      setPedidos(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.chat),orderBy('em','asc')),s=>
      setMsgs(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.galeria),orderBy('em','desc')),s=>
      setMidias(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.avisos),orderBy('em','desc')),s=>
      setAvisos(s.docs.map(d=>({id:d.id,...d.data()})))));
    return ()=>un.forEach(f=>f());
  },[uid]);

  // Lista de convidados (RSVP) — só os noivos leem a coleção inteira
  useEffect(()=>{
    if(!admin) return;
    const un = onSnapshot(collection(db,C.convidados),s=>
      setConvidados(s.docs.map(d=>({fone:d.id,...d.data()}))));
    return ()=>un();
  },[admin]);

  // Presentes meus que foram confirmados e que eu ainda não vi
  const [avisoConfirmado,setAvisoConfirmado] = useState(null);
  useEffect(()=>{
    if(!eu || !eu.fone) return;
    const meus = pedidos.filter(p=>p.fone===eu.fone && p.status==='confirmado');
    if(!meus.length) return;
    let vistos = [];
    try{ vistos = JSON.parse(localStorage.getItem(LSK+'_vistos')||'[]'); }catch(e){}
    const novos = meus.filter(p=>!vistos.includes(p.id));
    if(novos.length){
      setAvisoConfirmado(novos);
      localStorage.setItem(LSK+'_vistos',
        JSON.stringify([...vistos, ...novos.map(p=>p.id)]));
    }
  },[pedidos, eu]);

  // agregações de presentes
  const dados = useMemo(()=>{
    const confirmados = pedidos.filter(p=>p.status==='confirmado');
    const arrecadado  = confirmados.reduce((s,p)=>s+(p.total||0),0);
    const vezesDadas  = {};   // presente -> nº de pessoas que deram
    const cotasDadas  = {};   // essencial -> nº de cotas já compradas
    confirmados.forEach(p=>(p.itens||[]).forEach(i=>{
      vezesDadas[i.id]=(vezesDadas[i.id]||0)+1;
      if(i.qtd) cotasDadas[i.id]=(cotasDadas[i.id]||0)+i.qtd;
    }));
    return {arrecadado, vezesDadas, cotasDadas, confirmados};
  },[pedidos]);

  // A aba "Festa" só existe no dia do casamento (e nos 2 dias seguintes,
  // para quem quiser rever). Os noivos veem sempre, para testar antes.
  const festaOn = useMemo(()=>{
    const dia = new Date(CASAMENTO.dataISO);
    const ini = new Date(dia); ini.setHours(0,0,0,0);
    const fim = new Date(dia); fim.setDate(fim.getDate()+2);
    const hoje = new Date();
    return admin || (hoje>=ini && hoje<=fim);
  },[admin]);

  if(eu===null) return h('div',{style:{minHeight:'100vh',display:'flex',
    alignItems:'center',justifyContent:'center'}},h('div',{className:'spin esc'}));

  if(eu===false) return h(Gate,{uid,abrirLogin:forcarLogin,
    onEntrar:async(nome,foneTxt)=>{
      const fone = chaveFone(foneTxt);
      const ref  = doc(db,C.convidados,fone);
      const snap = await getDoc(ref);

      if(snap.exists()){
        // Já esteve aqui (talvez em outro aparelho): mantém o nome original,
        // só registra este dispositivo.
        const dado = snap.data();
        await setDoc(ref,{
          uids: [...new Set([...(dado.uids||[]), uid])],
          visto: serverTimestamp()
        },{merge:true});
        localStorage.setItem(LSK+'_fone', fone);
        setEu({fone, uid, ...dado, voltou:true});
      } else {
        const dado = {nome:nome.trim(), uids:[uid], em:serverTimestamp()};
        await setDoc(ref, dado);
        localStorage.setItem(LSK+'_fone', fone);
        setEu({fone, uid, ...dado});
      }
  }});

  const props = {eu,uid,admin,setAdmin,pedidos,msgs,midias,avisos,dados,aviso};

  // quantos pedidos aguardando confirmação (para o botão flutuante dos noivos)
  const pendentes = admin ? pedidos.filter(p=>p.status==='pendente').length : 0;

  // ── RSVP: abre no primeiro acesso de um convidado que ainda não respondeu ──
  const [rsvpAberto,setRsvpAberto] = useState(false);
  const podeRsvp = CONFIG.rsvp.ativo && eu && eu.fone && !eu.noivo;
  useEffect(()=>{
    if(podeRsvp && !eu.rsvp) setRsvpAberto(true);
  },[podeRsvp, eu && eu.rsvp]);

  const salvarRsvp = async (resp)=>{
    try{
      await setDoc(doc(db,C.convidados,eu.fone),{rsvp:{
        ...resp, em:serverTimestamp()
      }},{merge:true});
      setEu(e=>({...e, rsvp:{...resp}}));
      setRsvpAberto(false);
      aviso(resp.vai ? CONFIG.rsvp.depoisSim : CONFIG.rsvp.depoisNao);
    }catch(e){ aviso('Não deu para confirmar. Verifique a conexão.'); }
  };

  return h('div',{className:'shell'},
    aba==='casa'  && h(Casa,{...props,setAba,festaOn,
      reabrirRsvp: podeRsvp ? ()=>setRsvpAberto(true) : null}),
    aba==='gift'  && h(Presentes,{...props,pendentes,abrirPainel:()=>setPainelApp(true)}),
    aba==='festa' && h(AFesta,props),
    aba==='chat'  && h(Chat,props),
    aba==='foto'  && h(Galeria,props),
    aba==='local' && h(Local,props),
    h(Nav,{aba,setAba,nMsgs:msgs.length,nFotos:midias.length,festaOn}),
    toast && h('div',{className:'toast'},toast),

    rsvpAberto && h(Rsvp,{eu,salvar:salvarRsvp,
      fechar: eu.rsvp ? ()=>setRsvpAberto(false) : null}),

    painelApp && h(Painel,{pedidos,dados,convidados,fechar:()=>setPainelApp(false),aviso}),

    avisoConfirmado && h(Confirmado,{
      pedidos:avisoConfirmado,
      fechar:()=>setAvisoConfirmado(null)})
  );
}

/* ═════════════ RSVP — CONFIRMAÇÃO DE PRESENÇA ═════════════ */
function Rsvp({eu,salvar,fechar}){
  const R = CONFIG.rsvp;
  const anterior = eu.rsvp || {};
  const [vai,setVai]         = useState(anterior.vai ?? null);
  const [acomp,setAcomp]     = useState(anterior.acompanhantes || 0);
  const [nomes,setNomes]     = useState((anterior.nomes||[]).join('\n'));
  const [restricao,setRestr] = useState(anterior.restricao || '');
  const [salvando,setSalv]   = useState(false);

  const enviar = async ()=>{
    if(vai===null) return;
    setSalv(true);
    const resp = vai
      ? { vai:true,
          acompanhantes: Number(acomp)||0,
          nomes: nomes.split('\n').map(s=>s.trim()).filter(Boolean),
          restricao: restricao.trim() }
      : { vai:false, acompanhantes:0, nomes:[], restricao:'' };
    await salvar(resp);
    setSalv(false);
  };

  const opt = (val,label)=> h('button',{
    className:'btn '+(vai===val?(val?'btn-p':'btn-t'):'btn-o'),
    style:{flex:1},
    onClick:()=>setVai(val)}, label);

  return h('div',{className:'ov',onClick:e=>fechar&&e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},R.titulo),
        fechar && h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{style:{color:'var(--tinta-suave)',fontSize:'13.5px',
          lineHeight:1.55,marginBottom:'20px'}}, R.subtitulo),

        h('div',{style:{display:'flex',gap:'10px',marginBottom:'20px'}},
          opt(true,  R.simLabel),
          opt(false, R.naoLabel)),

        // campos extras só quando "vai"
        vai===true && h('div',null,
          h('div',{className:'eyebrow',style:{marginBottom:'8px'}},R.acompanhantesLabel),
          h('div',{style:{display:'flex',alignItems:'center',gap:'14px',marginBottom:'18px'}},
            h('button',{className:'btn btn-o btn-sm',style:{width:'42px',padding:'10px 0'},
              onClick:()=>setAcomp(Math.max(0,Number(acomp)-1))},'−'),
            h('div',{className:'mono',style:{fontSize:'20px',fontWeight:600,minWidth:'28px',
              textAlign:'center'}}, acomp),
            h('button',{className:'btn btn-o btn-sm',style:{width:'42px',padding:'10px 0'},
              onClick:()=>setAcomp(Number(acomp)+1)},'+')),

          Number(acomp) > 0 && h('div',{style:{marginBottom:'18px'}},
            h('div',{className:'eyebrow',style:{marginBottom:'8px'}},R.nomesLabel),
            h('textarea',{className:'inp',rows:Math.min(4,Number(acomp)),
              value:nomes,placeholder:R.nomesPlaceholder,
              onChange:e=>setNomes(e.target.value)})),

          h('div',{style:{marginBottom:'22px'}},
            h('div',{className:'eyebrow',style:{marginBottom:'8px'}},R.restricaoLabel),
            h('textarea',{className:'inp',rows:2,value:restricao,
              placeholder:R.restricaoPlaceholder,
              onChange:e=>setRestr(e.target.value)}))),

        h('button',{className:'btn btn-p',disabled:vai===null||salvando,
          onClick:enviar,style:{width:'100%'}},
          salvando?'Salvando…':R.enviar),

        h('div',{style:{height:'12px'}}))
    ));
}

/* ═════════════ AVISO: SEU PRESENTE FOI CONFIRMADO ═════════════ */
function Confirmado({pedidos,fechar}){
  const total = pedidos.reduce((s,p)=>s+(p.total||0),0);
  const itens = pedidos.flatMap(p=>p.itens||[]);
  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-b',style:{paddingTop:'26px'}},
        h('div',{className:'grat'},
          h('div',{className:'grat-ic'},h(Ic,{d:I.heart,s:28})),
          h('div',{className:'display grat-t'},'Recebemos, obrigado!'),
          h('p',{className:'grat-d'},
            pedidos.length>1
              ? 'Seus presentes foram confirmados.'
              : 'Seu presente foi confirmado.',
            ' Já está na lista, com o seu nome na nossa lembrança.'),
          h('div',{className:'grat-l'},
            h('div',{className:'eyebrow',style:{marginBottom:'9px'}},'Confirmado'),
            itens.map((p,i)=>h('div',{key:i,className:'grat-li'},
              h(Ic,{d:I.ok,s:15}),
              h('span',null,p.nome,
                p.qtd ? ' — '+p.qtd+(p.qtd===1?' cota':' cotas') : ''))),
            h('div',{style:{borderTop:'1px solid var(--linha)',marginTop:'10px',
              paddingTop:'10px',display:'flex',justifyContent:'space-between',
              fontSize:'13px'}},
              h('span',{style:{color:'var(--tinta-suave)'}},'Total'),
              h('b',{className:'mono',style:{color:'var(--oliva)'}},brl(total)))),
          h('button',{className:'btn btn-p',onClick:fechar},'De nada 💛')
        ))));
}

/* ═════════════ PORTÃO ═════════════ */
function Gate({onEntrar,abrirLogin}){
  const [nome,setNome]=useState('');
  const [fone,setFone]=useState('');
  const [busy,setBusy]=useState(false);
  const [login,setLogin]=useState(!!abrirLogin);
  const [erro,setErro]=useState('');
  const okNome = nome.trim().length>2;
  const okFone = foneValido(fone);
  const ok = okNome && okFone;
  useEffect(()=>{ if(abrirLogin) setLogin(true); },[abrirLogin]);

  const go=async()=>{
    if(busy) return;
    if(!okNome){ setErro('Escreva seu nome.'); return; }
    if(!okFone){ setErro('Digite o WhatsApp com DDD.'); return; }
    setErro(''); setBusy(true);
    try{ await onEntrar(nome,fone); }
    catch(e){
      setErro('Não deu para entrar. Verifique sua conexão.');
      setBusy(false);
    }
  };

  return h('div',{className:'gate'},
    h('div',{className:'gate-mark'},
      h('img',{className:'brasao',src:BRASAO,alt:'Brasão '+nomesLinha,
        width:132,height:132,style:{marginBottom:'22px'}}),
      h('h1',{className:'display gate-nomes'},
        NOMES[0], NOMES[1] && h('br'), NOMES[1] && h('span',{className:'gate-e'},CONECTOR), NOMES[1] && h('br'), NOMES[1] || null),
      h('div',{className:'gate-sub'},CONFIG.evento.dataCurta)
    ),
    h('div',{className:'card',style:{padding:'22px 20px'}},
      h('div',{style:{fontSize:'14px',lineHeight:1.6,color:'var(--tinta-suave)',marginBottom:'20px'}},
        'Que bom ter você aqui. Diga quem é você para entrar.'),
      h('div',{className:'fld'},
        h('label',null,'Seu nome'),
        h('input',{className:'inp',value:nome,autoFocus:true,
          placeholder:'Nome e sobrenome',
          onChange:e=>{setNome(e.target.value);setErro('')},
          onKeyDown:e=>e.key==='Enter'&&go()})),
      h('div',{className:'fld'},
        h('label',null,'WhatsApp'),
        h('input',{className:'inp',value:fone,type:'tel',inputMode:'numeric',
          placeholder:'(15) 99999-9999',
          onChange:e=>{setFone(mascaraFone(e.target.value));setErro('')},
          onKeyDown:e=>e.key==='Enter'&&go()}),
        h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',
          marginTop:'6px',lineHeight:1.5}},
          'É assim que a gente te reconhece se você abrir o app noutro celular.')),
      erro && h('div',{style:{fontSize:'12.5px',color:'var(--erro)',
        marginBottom:'12px',lineHeight:1.5}},erro),
      h('button',{className:'btn btn-p',disabled:busy,onClick:go},
        busy ? h('div',{className:'spin'}) : 'Entrar')
    ),
    h('div',{style:{textAlign:'center',marginTop:'22px'}},
      h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',lineHeight:1.6}},
        CONFIG.evento.local+' · '+CONFIG.evento.localCidade),
      h('button',{style:{fontSize:'11px',color:'var(--linha)',letterSpacing:'.1em',
        marginTop:'14px',padding:'6px'},
        onClick:()=>setLogin(true)},'· · ·')),

    login && h(LoginNoivos,{fechar:()=>setLogin(false)})
  );
}

/* ── login dos noivos (e-mail + senha) ── */
function LoginNoivos({fechar}){
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [busy,setBusy]=useState(false);
  const [erro,setErro]=useState('');
  const sair=()=>{
    if(location.hash.toLowerCase()==='#noivos'){
      location.href = location.pathname;   // volta a ser convidado
    } else {
      fechar();
    }
  };

  const entrar=async()=>{
    if(busy||!email.trim()||!senha) return;
    setBusy(true); setErro('');
    try{
      await signInWithEmailAndPassword(auth,email.trim(),senha);
      // onAuthStateChanged assume daqui
    }catch(e){
      setErro('E-mail ou senha não conferem.');
      setBusy(false);
    }
  };

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&sair()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},CONFIG.rotulos.entrarComo),
        h('button',{className:'mod-x',onClick:sair},h(Ic,{d:I.x,s:16}))),
      h('div',{className:'mod-b'},
        h('div',{className:'fld'},
          h('label',null,'E-mail'),
          h('input',{className:'inp',type:'email',value:email,autoFocus:true,
            autoComplete:'username',placeholder:'seu@email.com',
            onChange:e=>setEmail(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&entrar()})),
        h('div',{className:'fld'},
          h('label',null,'Senha'),
          h('input',{className:'inp',type:'password',value:senha,
            autoComplete:'current-password',placeholder:'••••••••',
            onChange:e=>setSenha(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&entrar()})),
        erro && h('div',{style:{fontSize:'12.5px',color:'var(--erro)',
          marginBottom:'12px',lineHeight:1.5}},erro),
        h('button',{className:'btn btn-p',disabled:busy,onClick:entrar},
          busy?h('div',{className:'spin'}):[h(Ic,{key:'i',d:I.lock,s:16}),'Entrar']),
        h('button',{className:'btn',style:{marginTop:'6px',color:'var(--tinta-suave)',
          fontSize:'12.5px'},onClick:()=>{
            location.href = location.pathname;   // limpa o #noivos e recarrega
          }},'Sou convidado, entrar normalmente'),
        h('p',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',textAlign:'center',
          marginTop:'12px',lineHeight:1.6}},
          CONFIG.rotulos.areaReservada)
      )));
}

/* ═════════════ CASA ═════════════ */

  useEffect(()=>{
    const alvo=new Date(CASAMENTO.dataISO).getTime();
    const tick=()=>{
      const df=alvo-Date.now();
      if(df<=0){setT({d:0,h:0,m:0,s:0});return}
      setT({
        d:Math.floor(df/864e5),
        h:Math.floor(df/36e5)%24,
        m:Math.floor(df/6e4)%60,
        s:Math.floor(df/1e3)%60
      });
    };
    tick(); const iv=setInterval(tick,1000);

/* ═════════════ PRESENTES ═════════════ */
function Presentes({eu,uid,dados,aviso,pedidos,admin,pendentes,abrirPainel}){
  // Meus presentes: pelo TELEFONE, então aparecem em qualquer aparelho.
  const meus = useMemo(()=>
    (pedidos||[])
      .filter(p=>p.fone===eu.fone)
      .sort((a,b)=>(b.em?.seconds||0)-(a.em?.seconds||0)),
    [pedidos, eu.fone]);

  const [sel,setSel]   = useState([]);   // {id,nome,valor,qtd?}
  const [pay,setPay]   = useState(false);
  const [feito,setFeito]= useState(null);
  const [cotaDe,setCotaDe] = useState(null);   // essencial aberto no seletor

  // Passeios: ilimitados. Essenciais: travam ao completar as cotas.
  const restam = e => (e.cotas - (dados.cotasDadas[e.id]||0));

  const toggle = p =>
    setSel(s => s.find(x=>x.id===p.id) ? s.filter(x=>x.id!==p.id) : [...s,p]);

  const addCota = (e,qtd) => {
    setSel(s=>{
      const fora = s.filter(x=>x.id!==e.id);
      return qtd>0
        ? [...fora, {id:e.id, nome:e.nome, valor:e.cota*qtd, qtd, cota:e.cota}]
        : fora;
    });
    setCotaDe(null);
  };

  const total = sel.reduce((s,p)=>s+p.valor,0);
  const pct   = Math.min(100,(dados.arrecadado/ALVO_LUA_MEL)*100);

  if(feito) return h(Obrigado,{pedido:feito,voltar:()=>{setFeito(null);setSel([])}});

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},CONFIG.textos.presentesEyebrow),
        h('h2',{className:'display sec-t'},CONFIG.textos.presentesTitulo),
        h('p',{className:'sec-d'},
          CONFIG.textos.presentesIntro,
          ESSENCIAIS.length>0 ? 'Alguns itens são divididos em cotas; os demais você pode presentear inteiros.' : '')
      ),

      // Presentes que EU já dei (identificados pelo meu telefone)
      meus.length>0 && h('div',{className:'card',style:{padding:'16px 18px',marginBottom:'20px',
        borderColor:'var(--oliva-claro)'}},
        h('div',{className:'eyebrow',style:{marginBottom:'10px',color:'var(--oliva)'}},
          'Você já presenteou'),

          h('div',{style:{minWidth:0}},

              (p.itens||[]).map(i=>
                i.qtd ? i.nome+' ('+i.qtd+'x)' : i.nome).join(' · ')),

              p.status==='confirmado' ? 'Confirmado' : 'Aguardando confirmação')),
          h('b',{className:'mono',style:{color:'var(--oliva)',whiteSpace:'nowrap'}},
            brl(p.total)))),
        h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',
          marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--linha)',
          lineHeight:1.5}},
          'Pode presentear mais, se quiser.')),

      h('div',{className:'termo'},
        h('div',{className:'termo-top'},
          h('div',{className:'termo-eyebrow'},CONFIG.textos.metaEyebrow),
          h('div',{className:'termo-t'},CONFIG.textos.metaTitulo),
          h('div',{className:'termo-sub'},CONFIG.textos.presentesSub||'')),
        h('div',{className:'termo-bar-wrap'},
          h('div',{className:'termo-nums'},
            h('span',{className:'termo-val mono'},brl(dados.arrecadado)),
            h('span',{className:'termo-alvo mono'},'de '+brl(ALVO_LUA_MEL))),
          h('div',{className:'termo-bar'},
            h('div',{className:'termo-fill',style:{width:pct+'%'}})),

      // Botão dos noivos: confirmar pagamentos. Só aparece para vocês.

              h('div',{className:'ess-f'},

                  cheio ? 'Presenteado por completo'

                h('span',{className:'ess-v mono'},
                  meu ? brl(meu.valor) : brl(e.cota),
                  !meu && h('small',null,' /cota')))));
        })),

      // ── PASSEIOS ──
      h('div',{className:'sub-t'},'Os passeios'),
      h('div',{className:'grid',style:{marginBottom:'26px'}},
        PASSEIOS.map(p=>{
          const vezes = dados.vezesDadas[p.id]||0;   // quantas pessoas já deram
          const on    = !!sel.find(x=>x.id===p.id);
          return h('div',{key:p.id,
            className:'pres'+(on?' sel':''),
            onClick:()=>toggle(p)},
            h('img',{className:'pres-img',src:p.img,alt:p.nome,loading:'lazy'}),
            on && h('div',{className:'pres-chk'},h(Ic,{d:I.ok,s:13})),
            p.destaque && h('div',{className:'pres-tag'},p.destaque),
            h('div',{className:'pres-b'},
              h('div',{className:'pres-n'},p.nome),
              h('div',{className:'pres-v mono'},brl(p.valor),
                h('small',null,p.sub)),
              vezes>0
                ? h('div',{className:'social'},
                    h(Ic,{d:I.heart,s:11}),
                    h('span',null, vezes===1
                      ? '1 já deu — você também pode'
                      : vezes+' já deram — junte-se a eles'))

            onClick:()=>setSel(s=>on?s.filter(x=>x.id!==p.id):[...s,p])},
            h('div',{className:'especial-ic'},h(Ic,{d:I.star,s:19})),
            h('div',{style:{minWidth:0}},
              h('div',{className:'especial-t'},p.nome),
              h('div',{className:'especial-d'},p.desc),
              (vezes>0
                ? h('div',{className:'social',style:{marginTop:'5px'}},
                    h(Ic,{d:I.heart,s:11}),
                    h('span',null, vezes===1
                      ? '1 já deu — você também pode'
                      : vezes+' já deram — junte-se a eles'))
                : h('div',{className:'social social-1',style:{marginTop:'5px'}},
                    h(Ic,{d:I.heart,s:11}),
                    h('span',null,'Seja o primeiro a dar este')))),
            h('div',{className:'especial-v mono'},brl(p.valor)),
            on && h('div',{className:'pres-chk',style:{background:'var(--ouro)',top:'-7px',right:'-7px'}},
              h(Ic,{d:I.ok,s:13})));

      ),

      h('div',{style:{textAlign:'center',fontSize:'12px',color:'var(--tinta-suave)',
        paddingBottom:'40px',lineHeight:1.6}},
        'Pagamento por Pix ou cartão de crédito.',h('br'),
        'Conferimos e avisamos você aqui mesmo.')
    ),

    sel.length>0 && h('div',{className:'cart'},
      h('div',{className:'cart-i'},
        h('div',{className:'cart-c'},sel.length===1?'1 presente':sel.length+' presentes'),
        h('div',{className:'cart-v mono'},brl(total))),
      h('button',{className:'cart-b',onClick:()=>setPay(true)},'Presentear')),

    cotaDe && h(SeletorCota,{
      ess:cotaDe,
      dadas:dados.cotasDadas[cotaDe.id]||0,
      atual:(sel.find(x=>x.id===cotaDe.id)||{}).qtd||0,
      fechar:()=>setCotaDe(null),
      confirmar:q=>addCota(cotaDe,q)}),

    pay && h(Pagar,{sel,total,eu,uid,aviso,
      fechar:()=>setPay(false),
      concluir:p=>{setPay(false);setFeito(p)}})
  );
