/* ═════════════ SELETOR DE COTAS ═════════════ */
function SeletorCota({ess,dadas,atual,fechar,confirmar}){
  const sobra = ess.cotas - dadas;
  const [q,setQ] = useState(atual || 1);
  const clamp = n => Math.max(0, Math.min(sobra, n));
  const total = ess.cota * q;
  const pctViagem = (total / ALVO_LUA_MEL) * 100;

  const atalhos = [1,2,4,sobra].filter((v,i,a)=>v>0 && v<=sobra && a.indexOf(v)===i);

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},ess.nome),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),
      h('div',{className:'mod-b'},
        h('img',{src:ess.img,alt:'',
          style:{width:'100%',aspectRatio:'16/9',objectFit:'cover',
            borderRadius:'11px',marginBottom:'16px'}}),

        h('p',{style:{fontSize:'13.5px',color:'var(--tinta-suave)',lineHeight:1.6,
          marginBottom:'18px'}},
          ess.sub,'. Custa ',
          h('b',{style:{color:'var(--tinta)'}},brl(ess.cota*ess.cotas)),
          ' no total, dividido em ',ess.cotas,' cotas de ',
          h('b',{style:{color:'var(--tinta)'}},brl(ess.cota)),'.'),

        h('div',{className:'tot-box',style:{marginBottom:'18px'}},
          h('div',{className:'ess-bar',style:{height:'7px'}},
            h('div',{className:'ess-fill',
              style:{width:((dadas+q)/ess.cotas*100)+'%'}})),
          h('div',{style:{display:'flex',justifyContent:'space-between',
            fontSize:'11.5px',color:'var(--tinta-suave)',marginTop:'9px'}},
            h('span',null,dadas+' já presenteadas'),
            h('span',null,sobra+' ainda faltam'))),

        h('div',{className:'eyebrow',style:{marginBottom:'10px'}},'Quantas cotas você quer dar?'),

        h('div',{className:'contador'},
          h('button',{className:'cont-b',disabled:q<=1,
            onClick:()=>setQ(clamp(q-1))},'−'),
          h('div',{className:'cont-v'},
            h('div',{className:'cont-n mono'},q),
            h('div',{className:'cont-l'},q===1?'cota':'cotas')),
          h('button',{className:'cont-b',disabled:q>=sobra,
            onClick:()=>setQ(clamp(q+1))},'+')),

        atalhos.length>1 && h('div',{style:{display:'flex',gap:'7px',marginTop:'12px',
          justifyContent:'center',flexWrap:'wrap'}},
          atalhos.map(v=>h('button',{key:v,
            className:'tab'+(q===v?' on':''),
            onClick:()=>setQ(v)},
            v===sobra && sobra>1 ? 'Todas ('+v+')' : v+(v===1?' cota':' cotas')))),

        h('div',{className:'tot-f',style:{marginTop:'20px',paddingTop:'16px'}},
          h('span',null,'Você contribui com'),
          h('b',{className:'mono'},brl(total))),
        h('div',{style:{fontSize:'11.5px',color:'var(--oliva)',textAlign:'right',
          marginTop:'-6px',marginBottom:'18px'}},
          pctViagem.toFixed(1)+'% da meta'),

        h('button',{className:'btn btn-p',onClick:()=>confirmar(q)},
          h(Ic,{d:I.ok,s:16}),
          atual ? 'Atualizar para '+brl(total) : 'Adicionar '+brl(total)),
        atual>0 && h('button',{className:'btn',style:{marginTop:'8px',
          color:'var(--erro)',fontSize:'13px'},
          onClick:()=>confirmar(0)},'Remover da lista')
      )));
}

/* ═════════════ A FESTA (convidado paga sozinho) ═════════════ */
function AFesta({eu,aviso}){
  const [lado,setLado] = useState(null);
  const [val,setVal]   = useState(0);
  const [outro,setOutro]= useState('');
  const [esc,setEsc]   = useState(false);
  const [busy,setBusy] = useState(false);
  const [feito,setFeito]= useState(false);
  const [lanc,setLanc] = useState([]);
  const cv = useRef(null);

  const valor = outro ? Math.round(parseFloat(outro.replace(',','.'))||0) : val;
  const codigo = useMemo(()=> valor>0 ? pixBRCode(valor,'FESTA') : '', [valor]);

  useEffect(()=>{
    const u = onSnapshot(collection(db,C.festa), sn=>
      setLanc(sn.docs.map(d=>d.data())));
    return u;
  },[]);

  useEffect(()=>{
    if(!codigo || !cv.current) return;
    QRCode.toCanvas(cv.current,codigo,{width:196,margin:1,
      color:{dark:'#33261E',light:'#FFFFFF'}},e=>e&&console.error(e));
  },[codigo]);

  const totalDe = id => lanc.filter(l=>l.lado===id).reduce((s,l)=>s+(l.valor||0),0);

  const confirmar = async () => {
    if(valor<=0 || !lado || busy) return;
    setBusy(true);
    try{
      await addDoc(collection(db,C.festa),{
        lado, valor,
        nome: esc ? '' : eu.nome,
        escondido: esc,
        viaApp: true,
        em: serverTimestamp()
      });
      setFeito(true);
    }catch(e){ aviso('Não deu. Tente de novo.'); }
    setBusy(false);
  };

  if(feito) return h('div',{className:'pad'},
    h('div',{className:'card',style:{marginTop:'34px',padding:'30px 22px'}},
      h('div',{className:'grat'},
        h('div',{className:'grat-ic'},h(Ic,{d:I.heart,s:28})),
        h('div',{className:'display grat-t'},'Foi pro telão!'),
        h('p',{className:'grat-d'},
          esc ? 'Seu nome não apareceu — só o valor. Segredo guardado.'
              : 'Olha lá no telão: '+brl(valor)+' pra '+
                (lado==='noivo'?(FESTA.lados.noivo.item+' do '+FESTA.lados.noivo.nome):(FESTA.lados.noiva.item+' da '+FESTA.lados.noiva.nome))+'.'),
        h('button',{className:'btn btn-o',onClick:()=>{
          setFeito(false); setVal(0); setOutro(''); setLado(null); setEsc(false);
        }},'Dar de novo'))));

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Gravata & Sapatinho'),
        h('h2',{className:'display sec-t'},'De que lado você está?'),
        h('p',{className:'sec-d'},
          'A brincadeira mais antiga da festa. Escolha um lado, pague pelo Pix ',
          'e seu valor entra na disputa — ao vivo, no telão.')),

      // placar
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px',
        marginBottom:'20px'}},
        ['noivo','noiva'].map(id=>{
          const L = FESTA.lados[id];
          const on = lado===id;
          return h('button',{key:id,className:'card',
            style:{padding:'18px 14px',textAlign:'center',
              borderColor: on ? 'var(--terracota)' : 'var(--linha)',
              borderWidth: on ? '2px' : '1px',
              background: on ? '#FDF6F2' : '#fff'},
            onClick:()=>setLado(id)},
            h('div',{style:{fontSize:'30px',marginBottom:'6px'}},L.emoji),
            h('div',{style:{fontFamily:"'Fraunces',serif",fontSize:'17px',
              fontVariationSettings:'"SOFT" 0,"WONK" 0'}},L.nome),
            h('div',{style:{fontSize:'9.5px',letterSpacing:'.16em',
              textTransform:'uppercase',color:'var(--tinta-suave)',marginTop:'2px'}},
              L.item),
            h('div',{className:'mono',style:{fontSize:'16px',fontWeight:600,
              color:'var(--oliva)',marginTop:'9px'}},brl(totalDe(id))));
        })),

      lado && h('div',null,
        h('div',{className:'eyebrow',style:{marginBottom:'10px'}},'Quanto você vai dar?'),
        h('div',{className:'bd-vals'},
          FESTA.atalhos.map(v=>
            h('button',{key:v,className:'bd-v'+(val===v&&!outro?' on':''),
              onClick:()=>{setVal(v);setOutro('')}},'R$ '+v))),
        h('input',{className:'bd-outro',value:outro,type:'tel',inputMode:'numeric',
          placeholder:'Outro valor',
          onChange:e=>{setOutro(e.target.value.replace(/[^\d,]/g,''));setVal(0)}}),

        h('div',{className:'bd-esc'+(esc?' on':''),onClick:()=>setEsc(!esc)},
          h('div',{className:'bd-cx'}, esc && h(Ic,{d:I.ok,s:13})),
          h('div',null,
            h('div',{style:{fontWeight:500}},'Dar escondido'),
            h('div',{style:{fontSize:'11px',color:'var(--tinta-suave)',marginTop:'1px'}},
              'O telão mostra o valor, mas não o seu nome'))),

        valor>0 && h('div',null,
          h('div',{className:'qr-box'},h('canvas',{ref:cv})),
          h('button',{className:'btn btn-g',style:{marginBottom:'10px'},
            onClick:()=>{
              navigator.clipboard.writeText(codigo)
                .then(()=>aviso('Código copiado'))
                .catch(()=>aviso('Copie o código manualmente'));
            }},
            h(Ic,{d:I.copy,s:16}),'Copiar código Pix'),

          CARTAO.link && h('a',{href:CARTAO.link,target:'_blank',rel:'noopener',
            className:'btn btn-o',style:{textDecoration:'none',marginBottom:'14px'},
            onClick:()=>{
              const puro = valor.toFixed(2).replace('.',',');
              navigator.clipboard.writeText(puro).catch(()=>{});
              aviso('Valor '+puro+' copiado');
            }},
            h(Ic,{d:I.card,s:16}),'Pagar no cartão'),

          h('button',{className:'bd-lancar',disabled:busy,onClick:confirmar},
            busy ? h('div',{className:'spin'})
                 : [h(Ic,{key:'i',d:I.ok,s:18}),'Já paguei — mandar pro telão']),
          h('p',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',
            textAlign:'center',marginTop:'12px',lineHeight:1.6,paddingBottom:'30px'}},
            'Pague primeiro. Depois toque no botão e seu valor sobe no telão.')))
    ));
}

/* ═════════════ ABERTURA: ENVELOPE + CAPA ═════════════
   Primeira coisa que o convidado vê. Toca no envelope, ele abre,
   revela a capa com foto, música e contagem. Depois entra no app. */
function Abertura({onEntrar}){
  const [fase,setFase] = useState('lacre');   // lacre → abrindo → capa
  const [tocando,setTocando] = useState(false);
  const audio = useRef(null);

  const abrir = () => {
    if(fase!=='lacre') return;
    setFase('abrindo');
    // tenta tocar a música ao abrir (alguns navegadores exigem o toque, e este é um)
    setTimeout(()=>{
      setFase('capa');
      if(audio.current){
        audio.current.play().then(()=>setTocando(true)).catch(()=>{});
      }
    }, 1500);
  };

  const toggleMusica = () => {
    if(!audio.current) return;
    if(tocando){ audio.current.pause(); setTocando(false); }
    else { audio.current.play().then(()=>setTocando(true)).catch(()=>{}); }
  };

  const entrar = () => {
    if(audio.current){ audio.current.pause(); }
    onEntrar();
  };

  return h('div',{className:'abr'},
    h('audio',{ref:audio, src:CASAMENTO.musica, loop:true, preload:'none'}),

    // ── ENVELOPE ──
    (fase==='lacre' || fase==='abrindo') &&
      h('div',{className:'env'+(fase==='abrindo'?' abrindo':''), onClick:abrir},
        h('div',{className:'env-corpo'},
          h('div',{className:'env-aba'}),
          h('div',{className:'env-lacre'},
            h('img',{src:BRASAO,alt:'',className:'env-brasao'})),
          h('div',{className:'env-txt'},'Toque para abrir')),
      ),

    // ── CAPA ──
    fase==='capa' && h('div',{className:'capa'},
      h('div',{className:'capa-foto',style:{backgroundImage:'url('+FOTO_CASAL+')'}},
        h('div',{className:'capa-grad'})),

      h('div',{className:'capa-conteudo'},
        h('div',{className:'capa-top'},
          h('img',{src:BRASAO,alt:'',className:'capa-brasao'})),

        h('div',{style:{flex:1}}),
        h('div',{className:'capa-nomes script'},CASAMENTO.noiva+' & '+CASAMENTO.noivo),

        // player de música
        h('button',{className:'capa-musica'+(tocando?' on':''), onClick:toggleMusica},
          h('div',{className:'capa-mus-ic'},
            tocando ? h(Ic,{d:I.pause,s:16}) : h(Ic,{d:I.play,s:16})),
          h('div',{className:'capa-ondas'+(tocando?' ativo':'')},
            ...Array.from({length:5}).map((_,i)=>h('span',{key:i}))),
          h('span',{className:'capa-mus-txt'},
            tocando ? 'Nossa música' : 'Tocar nossa música')),

        h(ContagemCapa),

        h('button',{className:'capa-entrar', onClick:entrar},
          'Entrar', h(Ic,{d:I.arrow,s:17})),

        CASAMENTO.versiculo && h('div',{className:'capa-vers'},
          '"',CASAMENTO.versiculo,'"',
          h('span',{className:'capa-vers-ref'},CASAMENTO.versiculoRef)))
    )
  );
}

/* contagem regressiva estilizada para a capa */
function ContagemCapa(){
  const [t,setT] = useState(()=>calcRestante());
  useEffect(()=>{
    const id = setInterval(()=>setT(calcRestante()), 1000);
    return ()=>clearInterval(id);
  },[]);
  if(t.passou) return h('div',{className:'cap-cont'},
    h('div',{className:'cap-cont-hoje'},'É hoje! 💛'));
  return h('div',{className:'cap-cont'},
    [['dias',t.d],['horas',t.h],['min',t.m],['seg',t.s]].map(([l,v])=>
      h('div',{key:l,className:'cap-cont-bloco'},
        h('div',{className:'cap-cont-n mono'},String(v).padStart(2,'0')),
        h('div',{className:'cap-cont-l'},l))));
}

function calcRestante(){
  const alvo = new Date(CASAMENTO.dataISO).getTime();
  const agora = Date.now();
  let dif = Math.floor((alvo-agora)/1000);
  if(dif<=0) return {passou:true};
  const d = Math.floor(dif/86400); dif%=86400;
  const h = Math.floor(dif/3600); dif%=3600;
  const m = Math.floor(dif/60);
  const s = dif%60;
  return {d,h,m,s,passou:false};
}

/* ═════════════ TELÃO — ENCERRAMENTO ═════════════
   O padrinho toca "Encerrar" e a tela vira agradecimento.
   Os nomes de quem deu passam flutuando, como créditos. */
function TelaoFim({lanc, tNoivo, tNoiva, tudo, lidera}){
  const [fase,setFase] = useState(0);

  useEffect(()=>{
    const t1 = setTimeout(()=>setFase(1), 1400);   // revela o total
    const t2 = setTimeout(()=>setFase(2), 4200);   // placar + nomes
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[]);

  // nomes únicos, na ordem em que deram
  const nomes = useMemo(()=>{
    const vis = new Set(), out = [];
    [...lanc].reverse().forEach(l=>{
      if(l.nome && !vis.has(l.nome)){ vis.add(l.nome); out.push(l.nome); }
    });
    return out;
  },[lanc]);

  const escondidos = lanc.filter(l=>l.escondido || !l.nome).length;

  return h('div',{className:'fim'},
    h('div',{className:'fim-luz'}),

    h('div',{className:'fim-in'},
      h('img',{src:BRASAO,alt:'',className:'fim-brasao'}),

      h('div',{className:'fim-l'},'Gravata & Sapatinho'),
      h('div',{className:'fim-ass'},nomesLinha+' · '+CONFIG.evento.dataCurta),

      h('div',{className:'fim-v mono'+(fase>=1?' on':''),
        style:{fontSize:cabe(brl(tudo), 19, 11)}}, brl(tudo)),

      fase>=1 && h('div',{className:'fim-t'},
        'Obrigado, de coração. 💛'),

      fase>=2 && h('div',{className:'fim-placar'},
        ['noivo','noiva'].map(id=>{
          const L = FESTA.lados[id];
          const t = id==='noivo' ? tNoivo : tNoiva;
          return h('div',{key:id,className:'fim-lado '+id+(lidera===id?' win':'')},
            h('div',{className:'fim-lado-e'},L.emoji),
            h('div',{className:'fim-lado-n'},L.nome),
            h('div',{className:'fim-lado-v mono'},brl(t)),
            lidera===id && h('div',{className:'fim-selo'},'venceu a brincadeira'));
        })),

      fase>=2 && nomes.length>0 && h('div',{className:'fim-nomes'},
        h('div',{className:'fim-nomes-l'},'Nosso obrigado a vocês'),
        h(Letreiro,{nomes, escondidos}))
    ),

  );
}

/* ── Letreiro: 1 ou 2 faixas rolando, altura fixa.
      Cabe qualquer quantidade de nomes sem quebrar o layout. ── */
function Letreiro({nomes, escondidos}){
  const lista = [...nomes];
  if(escondidos>0){
    lista.push(escondidos===1 ? 'e alguém que deu escondido'
                              : 'e '+escondidos+' que deram escondido');
  }
  if(!lista.length) return null;

  // Muita gente? divide em duas faixas, que rolam em sentidos opostos.
  // Assim cada nome fica visível por mais tempo.
  const duas = lista.length > 26;
  const meio = Math.ceil(lista.length/2);
  const grupos = duas ? [lista.slice(0,meio), lista.slice(meio)] : [lista];

  return h('div',{className:'letr-wrap'},
    grupos.map((g,gi)=>h(Faixa,{key:gi, itens:g, volta: gi===1})));
}

function Faixa({itens, volta}){
  // repete até encher a tela, para a emenda não aparecer
  let base = itens;
  while(base.length < 12) base = [...base, ...itens];

  const dur = Math.max(30, Math.min(base.length * 4, 150));

  const bloco = (k) => h('div',{className:'letr-faixa',key:k},
    base.map((n,i)=>[
      h('span',{key:'n'+i,
        className:'letr-n'+(n.startsWith('e ')?' anon':'')}, n),
      h('span',{key:'d'+i,className:'letr-d'},'♥')
    ]));

  return h('div',{className:'letr'},
    h('div',{className:'letr-in'+(volta?' volta':''),
      style:{animationDuration:dur+'s'}},
      bloco('a'), bloco('b')),
    h('div',{className:'letr-fade esq'}),
    h('div',{className:'letr-fade dir'}));
}

/* ═════════════ TELÃO ═════════════
   Tela cheia para a TV do salão. Sem login — é só leitura.
   Abra em: .../#telao   (F11 para tela cheia) */
function Telao(){
  const [lanc,setLanc]   = useState([]);
  const [cham,setCham]   = useState({});
  const [flash,setFlash] = useState(null);   // revelação em destaque
  const [fim,setFim]     = useState(false);  // encerrado?
  const vistos = useRef(new Set());
  const primeira = useRef(true);

  useEffect(()=>{
    signInAnonymously(auth).catch(e=>console.error(e));

    const u3 = onSnapshot(doc(db,C.chamada,'_fim'), sn=>{
      setFim(sn.exists() && sn.data().fim === true);
    });

    const u1 = onSnapshot(query(collection(db,C.festa),orderBy('em','desc')), sn=>{
      const arr = sn.docs.map(d=>({id:d.id,...d.data()}));
      setLanc(arr);

      // primeira carga: não pisca nada
      if(primeira.current){
        arr.forEach(l=>vistos.current.add(l.id));
        primeira.current = false;
        return;
      }
      // lançamento novo → revela em destaque
      const novo = arr.find(l=>!vistos.current.has(l.id));
      if(novo){
        arr.forEach(l=>vistos.current.add(l.id));
        setFlash(novo);
        setTimeout(()=>setFlash(f=>f&&f.id===novo.id?null:f), 6000);
      }
    });

    const u2 = onSnapshot(collection(db,C.chamada), sn=>{
      const o = {};
      sn.docs.forEach(d=> o[d.id] = d.data());
      setCham(o);
    });

    return ()=>{ u1(); u2(); u3(); };
  },[]);

  const totalDe = id => lanc.filter(l=>l.lado===id)
                            .reduce((s,l)=>s+(l.valor||0),0);
  const ultimoDe = id => lanc.find(l=>l.lado===id && l.nome);

  const tNoivo = totalDe('noivo');
  const tNoiva = totalDe('noiva');
  const tudo   = tNoivo + tNoiva;
  const lidera = tNoivo === tNoiva ? null : (tNoivo > tNoiva ? 'noivo' : 'noiva');

  if(fim) return h(TelaoFim,{lanc, tNoivo, tNoiva, tudo, lidera});

  return h('div',{className:'tv'},
    // ── placar ──
    h('div',{className:'tv-top'},
      h('img',{src:BRASAO,alt:'',className:'tv-brasao'}),
      h('div',{className:'tv-total'},
        h('div',{className:'tv-total-l'},'Arrecadado'),
        h('div',{className:'tv-total-v mono'},brl(tudo)))),

    // ── dois lados ──
    h('div',{className:'tv-grid'},
      ['noivo','noiva'].map(id=>{
        const L  = FESTA.lados[id];
        const t  = totalDe(id);
        const ch = cham[id];
        const ult= ultimoDe(id);
        const ganha = lidera === id;
        return h('div',{key:id,className:'tv-col '+id+(ganha?' lidera':'')},

          h('div',{className:'tv-cab'},
            h('div',{className:'tv-emoji'},L.emoji),
            h('div',null,
              h('div',{className:'tv-nome'},L.nome),
              h('div',{className:'tv-item'},L.item)),
            ganha && h('div',{className:'tv-coroa'},'na frente')),

          h('div',{className:'tv-valor mono',
            style:{fontSize:cabe(brl(t), 15, 8)}}, brl(t)),

          // chamando alguém agora
          ch && ch.nome
            ? h('div',{className:'tv-chamada'},
                h('div',{className:'tv-chamada-l'},L.chamada),
                h('div',{className:'tv-chamada-n',
                  style:{fontSize:cabe(ch.nome, 12, 9)}}, ch.nome),
                h('div',{className:'tv-pulso'},
                  h('span'),h('span'),h('span')))
            : h('div',{className:'tv-chamada vazio'},
                h('div',{className:'tv-chamada-l'},L.chamada),
                h('div',{className:'tv-chamada-n aguard'},'...')),

          // último que deu
          ult && h('div',{className:'tv-ultimo'},
            h('span',{className:'tv-cor'},'💛'),' ',
            h('b',null,ult.nome),' ',
            ult.escondido ? '' : L.jaDeu));
      })),

    // ── revelação ──
    flash && h('div',{className:'tv-flash '+flash.lado,key:flash.id},
      h('div',{className:'tv-flash-in'},
        h('div',{className:'tv-flash-v mono',
          style:{fontSize:cabe(brl(flash.valor), 30, 10)}}, brl(flash.valor)),
        h('div',{className:'tv-flash-n'},
          flash.escondido
            ? FESTA.lados[flash.lado].escondido
            : (flash.nome ? flash.nome+' '+FESTA.lados[flash.lado].jaDeu
                          : 'Alguém '+FESTA.lados[flash.lado].jaDeu),
          ' 💛'))),

    lanc.length===0 && h('div',{className:'tv-rodape'},
      'Gravata e sapatinho · o valor aparece aqui na hora')
  );
}

/* ═════════════ BANDEJA (padrinho / madrinha) ═════════════
   Abra em: .../#bandeja   → pede a senha → opera um dos lados. */
function Bandeja(){
  const [lado,setLado]   = useState(null);   // 'noivo' | 'noiva'
  const [pronto,setPronto] = useState(false);
  const [lanc,setLanc]   = useState([]);
  const [cham,setCham]   = useState(null);

  const [nome,setNome]   = useState('');
  const [val,setVal]     = useState(0);
  const [outro,setOutro] = useState('');
  const [esc,setEsc]     = useState(false);
  const [busy,setBusy]   = useState(false);
  const [toast,setToast] = useState('');
  const [encerrado,setEncerrado] = useState(false);

  const av = t =>{ setToast(t); setTimeout(()=>setToast(''),2200); };

  useEffect(()=>{ signInAnonymously(auth).catch(e=>console.error(e)); },[]);

  useEffect(()=>{
    const u = onSnapshot(doc(db,C.chamada,'_fim'), sn=>
      setEncerrado(sn.exists() && sn.data().fim === true));
    return u;
  },[]);

  useEffect(()=>{
    if(!lado) return;
    const u1 = onSnapshot(query(collection(db,C.festa),orderBy('em','desc')), sn=>{
      setLanc(sn.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.lado===lado));
      setPronto(true);
    });
    const u2 = onSnapshot(doc(db,C.chamada,lado), sn=>{
      setCham(sn.exists() ? sn.data() : null);
    });
    return ()=>{ u1(); u2(); };
  },[lado]);

  if(!lado) return h(BandejaLogin,{entrar:setLado});

  const L = FESTA.lados[lado];
  const total = lanc.reduce((s,l)=>s+(l.valor||0),0);
  const valor = outro ? Math.round(parseFloat(outro.replace(',','.'))||0) : val;

  // Anuncia o nome no telão
  const chamar = async () => {
    const n = nome.trim();
    if(!n) return;
    await setDoc(doc(db,C.chamada,lado), {nome:n, em:serverTimestamp()});
    setNome('');
    av('No telão: '+n);
  };

  const limparChamada = async () => {
    await deleteDoc(doc(db,C.chamada,lado)).catch(()=>{});
  };

  // Revela o valor
  const lancar = async () => {
    if(valor<=0 || busy) return;
    setBusy(true);
    try{
      await addDoc(collection(db,C.festa),{
        lado, valor,
        nome: esc ? '' : (cham?.nome || ''),
        escondido: esc,
        em: serverTimestamp()
      });
      await limparChamada();
      setVal(0); setOutro(''); setEsc(false);
      av(brl(valor)+' no telão!');
    }catch(e){ av('Não deu. Tente de novo.'); }
    setBusy(false);
  };

  const desfazer = async (l) => {
    if(!confirm('Apagar '+brl(l.valor)+(l.nome?' de '+l.nome:'')+'?')) return;
    await deleteDoc(doc(db,C.festa,l.id));
    av('Apagado');
  };

  return h('div',{className:'bd'},
    h('div',{className:'bd-top '+lado},
      h('div',{className:'bd-quem'},
        h('div',{className:'bd-emoji'},L.emoji),
        h('div',null,
          h('div',{className:'bd-nome'},L.nome),
          h('div',{className:'bd-item'},L.item)),
        h('div',{className:'bd-total'},
          h('div',{className:'bd-total-l'},'Arrecadado'),
          h('div',{className:'bd-total-v mono'},brl(total))))),

    h('div',{className:'bd-b'},

      // ── 1. quem está sendo chamado ──
      cham && cham.nome
        ? h('div',{className:'bd-chamando'},
            h('div',{className:'bd-chamando-l'},'No telão agora'),
            h('div',{className:'bd-chamando-n'},cham.nome),
            h('div',{className:'bd-live'},h('i'),'ao vivo'),
            h('button',{style:{marginTop:'12px',fontSize:'12px',
              color:'var(--tinta-suave)'},
              onClick:limparChamada},'Cancelar chamada'))
        : h('div',{className:'card',style:{padding:'16px',marginBottom:'16px'}},
            h('div',{className:'eyebrow',style:{marginBottom:'9px'}},'Chamar no telão'),
            h('div',{style:{display:'flex',gap:'8px'}},
              h('input',{className:'inp',value:nome,autoFocus:true,
                placeholder:'Nome de quem vai dar',
                onChange:e=>setNome(e.target.value),
                onKeyDown:e=>e.key==='Enter'&&chamar()}),
              h('button',{className:'btn btn-p',style:{width:'auto',padding:'13px 18px'},
                disabled:!nome.trim(),onClick:chamar},
                h(Ic,{d:I.send,s:17}))),
            h('div',{style:{fontSize:'11px',color:'var(--tinta-suave)',
              marginTop:'8px',lineHeight:1.5}},
              'O nome aparece grande no telão e todo mundo olha. ',
              'Depois você lança o valor.')),

      // ── 2. valor ──
      h('div',{className:'eyebrow',style:{marginBottom:'10px'}},
        cham?.nome ? 'Quanto '+cham.nome.split(' ')[0]+' deu?' : 'Quanto deu?'),

      h('div',{className:'bd-vals'},
        FESTA.atalhos.map(v=>
          h('button',{key:v,className:'bd-v'+(val===v&&!outro?' on':''),
            onClick:()=>{setVal(v);setOutro('')}},
            'R$ '+v))),

      h('input',{className:'bd-outro',value:outro,type:'tel',inputMode:'numeric',
        placeholder:'Outro valor',
        onChange:e=>{setOutro(e.target.value.replace(/[^\d,]/g,''));setVal(0)}}),

      h('div',{className:'bd-esc'+(esc?' on':''),onClick:()=>setEsc(!esc)},
        h('div',{className:'bd-cx'}, esc && h(Ic,{d:I.ok,s:13})),
        h('div',null,
          h('div',{style:{fontWeight:500}},'Deu escondido'),
          h('div',{style:{fontSize:'11px',color:'var(--tinta-suave)',marginTop:'1px'}},
            'O telão mostra o valor, mas não o nome'))),

      h('button',{className:'bd-lancar',disabled:valor<=0||busy,onClick:lancar},
        busy ? h('div',{className:'spin'})
             : [h(Ic,{key:'i',d:I.up,s:19}),
                'Lançar '+(valor>0?brl(valor):'')]),

      // ── 3. histórico ──
      lanc.length>0 && h('div',{className:'bd-hist'},
        h('div',{className:'eyebrow',style:{marginBottom:'6px'}},
          lanc.length+(lanc.length===1?' lançamento':' lançamentos')),
        h('div',{className:'card',style:{padding:'4px 14px'}},
          lanc.slice(0,12).map(l=>
            h('div',{key:l.id,className:'bd-h'},
              h('div',{className:'bd-h-n'},
                l.escondido ? h('i',{style:{color:'var(--tinta-suave)'}},'Escondido')
                            : (l.nome || 'Sem nome'),
                h('small',null,hora(l.em))),
              h('div',{style:{display:'flex',alignItems:'center'}},
                h('span',{className:'bd-h-v mono'},brl(l.valor)),
                h('button',{className:'bd-undo',onClick:()=>desfazer(l)},'apagar')))))),

      // encerrar a brincadeira
      h('div',{style:{marginTop:'30px',paddingTop:'20px',
        borderTop:'1px solid var(--linha)'}},
        encerrado
          ? h('div',null,
              h('div',{style:{padding:'14px',background:'var(--papel)',
                borderRadius:'11px',textAlign:'center',marginBottom:'10px'}},
                h('div',{style:{fontSize:'13px',fontWeight:600,marginBottom:'3px'}},
                  'Brincadeira encerrada'),
                h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',
                  lineHeight:1.5}},
                  'O telão está mostrando o agradecimento.')),
              h('button',{className:'btn btn-o',
                onClick:async()=>{
                  if(!confirm('Voltar a receber? O telão volta ao placar.')) return;
                  await deleteDoc(doc(db,C.chamada,'_fim'));
                  av('Reaberto');
                }},'Reabrir'))
          : h('button',{className:'btn btn-o',
              onClick:async()=>{
                if(!confirm('Encerrar a brincadeira?\n\nO telão vai mostrar o total e o agradecimento. Dá para reabrir depois.')) return;
                await setDoc(doc(db,C.chamada,'_fim'),
                  {fim:true, em:serverTimestamp()});
                av('Encerrado — olha o telão!');
              }},
              h(Ic,{d:I.heart,s:16}),'Encerrar e agradecer')),

      h('div',{style:{textAlign:'center',marginTop:'20px'}},
        h('button',{style:{fontSize:'12px',color:'var(--tinta-suave)'},
          onClick:()=>{ if(confirm('Sair do modo bandeja?')) setLado(null); }},
          'Sair'))),

    toast && h('div',{className:'toast'},toast)
  );
}

/* ── senha da bandeja ── */
function BandejaLogin({entrar}){
  const [senha,setSenha]=useState('');
  const [erro,setErro]=useState('');

  const go=()=>{
    const s = senha.trim().toLowerCase();
    if(s === FESTA.senhas.padrinho.toLowerCase())      entrar('noivo');
    else if(s === FESTA.senhas.madrinha.toLowerCase()) entrar('noiva');
    else setErro('Senha incorreta.');
  };

  return h('div',{className:'gate'},
    h('div',{className:'gate-mark'},
      h('img',{className:'brasao',src:BRASAO,alt:'',width:96,height:96,
        style:{marginBottom:'20px'}}),
      h('div',{className:'display',style:{fontSize:'26px'}},'Gravata & Sapatinho'),
      h('div',{className:'gate-sub'},'Modo bandeja')),

    h('div',{className:'card',style:{padding:'22px 20px'}},
      h('p',{style:{fontSize:'13.5px',color:'var(--tinta-suave)',lineHeight:1.6,
        marginBottom:'18px'}},
        CONFIG.rotulos.festaSenhaNota),
      h('div',{className:'fld'},
        h('label',null,'Senha'),
        h('input',{className:'inp',type:'password',value:senha,autoFocus:true,
          placeholder:'••••••••',
          onChange:e=>{setSenha(e.target.value);setErro('')},
          onKeyDown:e=>e.key==='Enter'&&go()})),
      erro && h('div',{style:{fontSize:'12.5px',color:'var(--erro)',
        marginBottom:'12px'}},erro),
      h('button',{className:'btn btn-p',disabled:!senha.trim(),onClick:go},
        h(Ic,{d:I.lock,s:16}),'Entrar')),

    h('div',{style:{textAlign:'center',marginTop:'20px'}},
      h('button',{style:{fontSize:'12px',color:'var(--tinta-suave)'},
        onClick:()=>{location.href=location.pathname}},
        'Voltar ao app'))
  );
}

/* ═════════════ PAGAR ═════════════ */
function Pagar({sel,total,eu,uid,fechar,concluir,aviso}){
  const [meio,setMeio] = useState(null);
  const [busy,setBusy] = useState(false);
  const [qr,setQr]     = useState('');
  const cv = useRef(null);
  const codigo = useMemo(()=>pixBRCode(total,'JM'+Date.now().toString(36).toUpperCase()),[total]);

  useEffect(()=>{
    if(meio!=='pix'||!cv.current) return;
    QRCode.toCanvas(cv.current,codigo,{width:212,margin:1,
      color:{dark:'#33261E',light:'#FFFFFF'}},e=>e&&console.error(e));
  },[meio,codigo]);

  const salvar = async (forma) => {
    setBusy(true);
    const itens = sel.map(p=>{
      const it = {id:p.id, nome:p.nome, valor:p.valor};
      if(p.qtd){ it.qtd = p.qtd; it.cota = p.cota; }   // essencial: nº de cotas
      return it;
    });

    try{
      const ref = await addDoc(collection(db,C.pedidos),{
        uid, fone:eu.fone, nome:eu.nome,
        itens, total, forma, status:'pendente', em:serverTimestamp()
      });

      // Avisa os noivos por e-mail. Se falhar, não perde o presente:
      // o pedido já está salvo no Firestore e aparece no painel.
      if(AVISO_EMAIL){
        fetch(AVISO_EMAIL,{
          method:'POST',
          mode:'no-cors',                       // Apps Script não devolve CORS
          headers:{'Content-Type':'text/plain'},// evita o preflight OPTIONS
          body: JSON.stringify({
            nome:eu.nome, fone:eu.fone, itens, total, forma, pedido:ref.id
          })
        }).catch(e=>console.warn('aviso por e-mail falhou:',e));
      }

      concluir({id:ref.id,itens:sel,total,forma});
    }catch(e){
      console.error(e);
      aviso('Não foi possível registrar. Tente de novo.');
      setBusy(false);
    }
  };

  const linkCartao = CARTAO.link || '';

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},meio==='pix'?'Pagar com Pix':meio==='cartao'?'Pagar com cartão':'Seu presente'),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{className:'tot-box'},
          sel.map(p=>h('div',{key:p.id,className:'tot-l'},
            h('span',null,p.nome,
              p.qtd && h('span',{style:{color:'var(--tinta-suave)',fontSize:'11px'}},
                ' · '+p.qtd+(p.qtd===1?' cota':' cotas'))),
            h('b',{className:'mono'},brl(p.valor)))),
          h('div',{className:'tot-f'},
            h('span',null,'Total'),
            h('b',{className:'mono'},brl(total)))),

        !meio && h('div',null,
          h('button',{className:'btn btn-p',style:{marginBottom:'10px'},
            onClick:()=>setMeio('pix')},
            h(Ic,{d:I.copy,s:17}),'Pagar com Pix'),
          h('button',{className:'btn btn-o',onClick:()=>setMeio('cartao')},
            h(Ic,{d:I.card,s:17}),'Pagar com cartão de crédito'),
          h('p',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',textAlign:'center',
            marginTop:'16px',lineHeight:1.6}},
            'O Pix cai direto na conta e não tem taxa nenhuma.')),

        meio==='pix' && h('div',null,
          h('div',{className:'qr-box'},h('canvas',{ref:cv})),
          h('div',{className:'eyebrow',style:{marginBottom:'7px'}},'Pix copia e cola'),
          h('div',{className:'pix-code'},codigo),
          h('button',{className:'btn btn-g',style:{marginBottom:'10px'},
            onClick:()=>{
              navigator.clipboard.writeText(codigo)
                .then(()=>aviso('Código copiado'))
                .catch(()=>aviso('Selecione o código e copie manualmente'));
            }},
            h(Ic,{d:I.copy,s:16}),'Copiar código Pix'),
          h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',lineHeight:1.6,
            padding:'12px 14px',background:'var(--papel)',borderRadius:'10px',marginBottom:'14px'}},
            h('b',{style:{color:'var(--tinta)'}},'Como fazer: '),
            'abra o app do seu banco, escolha Pix → Ler QR Code (ou Pix Copia e Cola), ',
            'confirme o valor e finalize. Depois volte aqui e toque no botão abaixo.'),
          h('button',{className:'btn btn-t',disabled:busy,onClick:()=>salvar('pix')},
            busy ? h('div',{className:'spin'}) : [h(Ic,{key:'i',d:I.ok,s:17}),'Já fiz o Pix']),
          h('button',{className:'btn',style:{marginTop:'8px',color:'var(--tinta-suave)',fontSize:'13px'},
            onClick:()=>setMeio(null)},'Voltar')),

        meio==='cartao' && h('div',null,
          // O checkout é de valor livre: o convidado digita o valor lá.
          // Por isso destacamos o número aqui e deixamos copiar num toque.
          h('div',{className:'cart-val'},
            h('div',{className:'cart-val-l'},'Digite este valor no checkout'),
            h('div',{className:'cart-val-v mono'},brl(total)),
            h('button',{className:'cart-val-b',
              onClick:()=>{
                const puro = total.toFixed(2).replace('.',',');
                navigator.clipboard.writeText(puro)
                  .then(()=>aviso('Valor copiado: '+puro))
                  .catch(()=>aviso('Anote: '+brl(total)));
              }},
              h(Ic,{d:I.copy,s:14}),'Copiar valor')),

          h('div',{style:{fontSize:'12.5px',color:'var(--tinta-suave)',lineHeight:1.6,
            padding:'13px 15px',background:'var(--papel)',borderRadius:'10px',
            marginBottom:'16px'}},
            h('b',{style:{color:'var(--tinta)'}},'Como funciona: '),
            'você vai para o checkout do ',CARTAO.nome,
            ', digita o valor acima e paga com cartão (dá para parcelar). ',
            'Depois volte aqui e confirme.'),

          h('a',{href:linkCartao,target:'_blank',rel:'noopener',
            className:'btn btn-p',style:{textDecoration:'none',marginBottom:'10px'}},
            h(Ic,{d:I.card,s:17}),'Ir para o pagamento'),

          h('button',{className:'btn btn-t',disabled:busy,onClick:()=>salvar('cartao')},
            busy ? h('div',{className:'spin'})
                 : [h(Ic,{key:'i',d:I.ok,s:17}),'Já paguei no cartão']),

          h('button',{className:'btn',style:{marginTop:'8px',color:'var(--tinta-suave)',fontSize:'13px'},
            onClick:()=>setMeio(null)},'Voltar'))
      )
    )
  );
}

/* ═════════════ CHAT ═════════════ */
function Chat({eu,uid,msgs,avisos,admin,setAdmin,aviso}){
  const [txt,setTxt]=useState('');
  const [busy,setBusy]=useState(false);
  const fim=useRef(null);

  useEffect(()=>{fim.current?.scrollIntoView({behavior:'smooth'})},[msgs.length]);

  const enviar=async()=>{
    const t=txt.trim();
    if(!t||busy) return;
    setBusy(true); setTxt('');
    try{
      await addDoc(collection(db,C.chat),{
        uid, nome:eu.nome, txt:t.slice(0,600), em:serverTimestamp()
      });
    }catch(e){ aviso('Não foi enviado. Tente de novo.'); setTxt(t); }
    setBusy(false);
  };

  const apagar=async id=>{
    if(!confirm('Apagar esta mensagem para todos?')) return;
    await deleteDoc(doc(db,C.chat,id));
  };

  return h('div',{className:'chat-w'},
    h('div',{className:'avisos'},
      h('div',{className:'aviso-pub'},
        h('div',{style:{flexShrink:0,marginTop:'1px'}},h(Ic,{d:I.info,s:15})),
        h('div',null,
          'Esta conversa é ',h('b',null,'pública'),'. Tudo o que você escrever aqui ',
          CONFIG.rotulos.chatNota))),

    avisos.length>0 && h('div',{className:'avisos',style:{paddingTop:'0'}},
      avisos.slice(0,2).map(a=>h('div',{key:a.id,className:'aviso'},
        h('div',{className:'aviso-ic'},h(Ic,{d:I.info,s:17})),
        h('div',{className:'aviso-t'},
          h('b',null,CONFIG.rotulos.recadoDe),
          a.txt),
        admin && h('button',{className:'del-m',style:{opacity:1},
          onClick:()=>deleteDoc(doc(db,C.avisos,a.id))},h(Ic,{d:I.lixo,s:14}))))),

    h('div',{className:'msgs'},
      msgs.length===0 && h('div',{className:'vazio'},
        h('div',{className:'vazio-ic'},h(Ic,{d:I.chat,s:38})),
        h('div',{className:'vazio-t'},'Ninguém falou nada ainda'),
        h('div',{className:'vazio-d'},'Este é o espaço dos convidados. Diga oi, combine carona, pergunte o que quiser.')),

      msgs.map(m=>{
        const meu = m.uid===uid;
        return h('div',{key:m.id,className:'msg'+(meu?' eu':'')},
          !meu && h('div',{className:'av',style:{background:corDe(m.nome)}},iniciais(m.nome)),
          h('div',{className:'bub'},
            !meu && h('div',{className:'bub-n'},m.nome),
            h('div',null,m.txt),
            h('div',{className:'bub-h mono'},hora(m.em))),
          (admin||meu) && h('button',{className:'del-m',onClick:()=>apagar(m.id)},
            h(Ic,{d:I.lixo,s:13})));
      }),
      h('div',{ref:fim})),

    h('div',{className:'chat-in'},
      h('textarea',{className:'inp',rows:1,value:txt,maxLength:600,
        placeholder:'Escreva uma mensagem',
        onChange:e=>{
          setTxt(e.target.value);
          e.target.style.height='auto';
          e.target.style.height=Math.min(e.target.scrollHeight,96)+'px';
        },
        onKeyDown:e=>{
          if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();
            e.target.style.height='auto';}
        }}),
      h('button',{className:'chat-s',disabled:!txt.trim()||busy,onClick:enviar},
        busy?h('div',{className:'spin'}):h(Ic,{d:I.send,s:17})))
  );
}

/* ═════════════ GALERIA ═════════════ */
function Galeria({eu,uid,midias,admin,aviso}){
  const [busy,setBusy]=useState(false);
  const [prog,setProg]=useState(0);
  const [progTxt,setProgTxt]=useState('');
  const [erroUp,setErroUp]=useState('');
  const [lb,setLb]=useState(null);
  const inp=useRef(null);

  const configurado = CLOUDINARY.cloudName && CLOUDINARY.uploadPreset;

  // Envia 1 arquivo. Vídeos grandes vão em pedaços (chunks) para não bater
  // no limite de 100 MB do upload comum. O Cloudinary junta e comprime.
  const enviarUm = (arq, tipo, onProg) => new Promise((resolve,reject)=>{
    const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/${tipo}/upload`;
    const CHUNK = 6 * 1024 * 1024;   // 6 MB por pedaço
    const usaChunks = arq.size > CHUNK;
    const uid_arq = Date.now()+'-'+Math.random().toString(36).slice(2);

    const enviarPedaco = (inicio) => {
      const fim = Math.min(inicio+CHUNK, arq.size);
      const pedaco = arq.slice(inicio, fim);
      const fd = new FormData();
      fd.append('file', pedaco);
      fd.append('upload_preset', CLOUDINARY.uploadPreset);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      if(usaChunks){
        xhr.setRequestHeader('X-Unique-Upload-Id', uid_arq);
        xhr.setRequestHeader('Content-Range', `bytes ${inicio}-${fim-1}/${arq.size}`);
      }
      xhr.upload.onprogress = ev => {
        if(ev.lengthComputable && onProg){
          onProg(Math.round(((inicio+ev.loaded)/arq.size)*100));
        }
      };
      xhr.onload = () => {
        if(xhr.status<200 || xhr.status>=300){
          try{ reject(new Error(JSON.parse(xhr.responseText).error?.message||'falha')); }
          catch(_){ reject(new Error('Falha no envio (código '+xhr.status+')')); }
          return;
        }
        if(fim < arq.size){ enviarPedaco(fim); }        // próximo pedaço
        else { resolve(JSON.parse(xhr.responseText)); } // terminou
      };
      xhr.onerror = () => reject(new Error('Sem conexão durante o envio'));
      xhr.send(fd);
    };
    enviarPedaco(0);
  });

  const subir = async e => {
    const arqs=[...e.target.files];
    if(!arqs.length) return;
    if(!configurado){ aviso('Álbum ainda não está ativo.'); return; }
    setBusy(true); setProg(0);

    let ok=0, falhas=[];
    for(let idx=0; idx<arqs.length; idx++){
      const a = arqs[idx];
      const tipo = a.type.startsWith('video')?'video':'image';
      setProgTxt((arqs.length>1?`(${idx+1}/${arqs.length}) `:'')+
        (tipo==='video'?'Enviando vídeo':'Enviando foto'));
      try{
        const j = await enviarUm(a, tipo, p=>setProg(p));
        if(!j.secure_url) throw new Error(j.error?.message||'upload falhou');
        await addDoc(collection(db,C.galeria),{
          uid, nome:eu.nome, url:j.secure_url,
          thumb: tipo==='video'
            ? j.secure_url.replace('/upload/','/upload/so_0,w_400,h_400,c_fill/').replace(/\.\w+$/,'.jpg')
            : j.secure_url.replace('/upload/','/upload/w_400,h_400,c_fill,q_auto/'),
          tipo, pid:j.public_id, em:serverTimestamp()
        });
        ok++;
      }catch(err){
        console.error(err);
        falhas.push({nome:a.name, motivo:err.message, tipo});
      }
      setProg(0);
    }

    setBusy(false); setProg(0); setProgTxt('');
    e.target.value='';

    // Feedback honesto: o que subiu e o que falhou (o que faltava antes)
    if(falhas.length===0){
      aviso(ok===1?'Enviado para o álbum 💛':ok+' arquivos no álbum 💛');
    } else if(ok===0){
      const v = falhas.find(f=>f.tipo==='video');
      setErroUp(v
        ? 'O vídeo não subiu. Se for muito longo, tente um trecho mais curto ou grave em qualidade menor.'
        : 'Não deu para enviar. Verifique sua conexão e tente de novo.');
    } else {
      setErroUp(ok+(ok===1?' arquivo subiu, ':' arquivos subiram, ')+
        falhas.length+(falhas.length===1?' falhou.':' falharam.')+
        ' Tente reenviar o que faltou.');
    }
  };

  const apagar=async m=>{
    if(!confirm('Remover do álbum?')) return;
    await deleteDoc(doc(db,C.galeria,m.id));
    setLb(null);
  };

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Álbum coletivo'),
        h('h2',{className:'display sec-t'},CONFIG.textos.albumTitulo),
        h('p',{className:'sec-d'},
          'Tire fotos, grave vídeos, e mande tudo para cá. Todo mundo vê na hora — ',
          'e nós ficamos com o registro completo do nosso dia.')),

      h('input',{ref:inp,type:'file',accept:'image/*,video/*',multiple:true,
        style:{display:'none'},onChange:subir}),

      h('button',{className:'up-btn',disabled:busy,onClick:()=>{setErroUp('');inp.current.click()}},
        busy
          ? [h('div',{key:'s',className:'spin esc'}),
             h('span',{key:'t'},(progTxt||'Enviando')+'… '+prog+'%')]
          : [h(Ic,{key:'i',d:I.up,s:20}),
             h('span',{key:'t'},'Adicionar fotos e vídeos')]),

      !busy && h('div',{className:'up-limites'},
        'Fotos até 10 MB · vídeos curtos, no máximo 1 minuto (100 MB).',h('br'),
        'Vídeos grandes demoram para subir — grave em qualidade menor se puder.'),

      // aviso de falha (antes o erro sumia em silêncio)
      erroUp && h('div',{className:'up-erro'},
        h(Ic,{d:I.info,s:16}),
        h('div',{style:{flex:1}},erroUp),
        h('button',{className:'up-erro-x',onClick:()=>setErroUp('')},
          h(Ic,{d:I.x,s:14}))),

      busy && progTxt.includes('vídeo') && h('div',{className:'up-dica'},
        'Vídeos podem demorar um pouco. Deixe esta tela aberta.')
    ),

    midias.length===0
      ? h('div',{className:'vazio'},
          h('div',{className:'vazio-ic'},h(Ic,{d:I.foto,s:38})),
          h('div',{className:'vazio-t'},'O álbum começa com você'),
          h('div',{className:'vazio-d'},'Nada aqui ainda. A primeira foto pode ser a sua.'))
      : h('div',{className:'gal-grid'},
          midias.map(m=>h('div',{key:m.id,className:'gal-cell',onClick:()=>setLb(m)},
            h('img',{className:'gal-i',src:m.thumb||m.url,alt:'',loading:'lazy'}),
            m.tipo==='video' && h('div',{className:'gal-play'},h(Ic,{d:I.play,s:24,f:'currentColor'})),
            h('div',{className:'gal-au'},m.nome.split(/\s+/)[0])))),

    h('div',{style:{height:'40px'}}),

    lb && h('div',{className:'lb',onClick:e=>e.target===e.currentTarget&&setLb(null)},
      h('button',{className:'lb-x',onClick:()=>setLb(null)},h(Ic,{d:I.x,s:17})),
      lb.tipo==='video'
        ? h('video',{src:lb.url,controls:true,autoPlay:true,playsInline:true})
        : h('img',{src:lb.url,alt:''}),
      h('div',{className:'lb-i'},
        'Enviado por '+lb.nome,
        (admin||lb.uid===uid) && h('button',{
          style:{display:'block',margin:'10px auto 0',color:'#E08A6E',fontSize:'12px'},
          onClick:()=>apagar(lb)},'Remover')))
  );
}

/* ═════════════ PAINEL ADMIN ═════════════ */
function Painel({pedidos,dados,convidados,fechar,aviso}){
  const [tab,setTab]=useState('pendente');
  const [novoAviso,setNovoAviso]=useState('');

  // ── RSVP: agregações ──
  const comRsvp = (convidados||[]).filter(c=>c.rsvp);
  const vao     = comRsvp.filter(c=>c.rsvp.vai);
  const naoVao  = comRsvp.filter(c=>!c.rsvp.vai);
  // total de pessoas = confirmados + acompanhantes
  const totalPessoas = vao.reduce((s,c)=>s+1+(Number(c.rsvp.acompanhantes)||0),0);
  const comRestricao = vao.filter(c=>c.rsvp.restricao && c.rsvp.restricao.trim());

  const exportarCSV = ()=>{
    const linhas = [['Nome','WhatsApp','Vai?','Acompanhantes','Nomes acompanhantes','Restrição alimentar']];
    comRsvp.forEach(c=>{
      linhas.push([
        c.nome||'',
        c.fone||'',
        c.rsvp.vai?'Sim':'Não',
        c.rsvp.vai?(c.rsvp.acompanhantes||0):0,
        (c.rsvp.nomes||[]).join('; '),
        c.rsvp.restricao||''
      ]);
    });
    const esc = v => '"'+String(v).replace(/"/g,'""')+'"';
    const csv = '\uFEFF'+linhas.map(l=>l.map(esc).join(',')).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'confirmados-'+CONFIG.evento.nomeA+'-'+CONFIG.evento.nomeB+'.csv';
    a.click();
    URL.revokeObjectURL(url);
  };

  const lista = [...pedidos]
    .filter(p=>tab==='todos'||p.status===tab)
    .sort((a,b)=>(b.em?.seconds||0)-(a.em?.seconds||0));

  const mudar=async(p,st)=>{
    try{
      await updateDoc(doc(db,C.pedidos,p.id),{status:st});
      aviso(st==='confirmado'?'Presente confirmado':'Marcado como pendente');
    }catch(e){ aviso('Não deu para salvar. Verifique a conexão.'); }
  };

  const publicar=async()=>{
    const t=novoAviso.trim();
    if(!t) return;
    try{
      await addDoc(collection(db,C.avisos),{txt:t,em:serverTimestamp()});
      setNovoAviso(''); aviso('Recado publicado no chat');
    }catch(e){ aviso('Não deu para publicar. Verifique a conexão.'); }
  };

  const pend = pedidos.filter(p=>p.status==='pendente');
  const pendTotal = pend.reduce((s,p)=>s+(p.total||0),0);

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},CONFIG.rotulos.painelTitulo),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px',marginBottom:'22px'}},
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Confirmado'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--oliva)',marginTop:'5px'}},brl(dados.arrecadado))),
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Aguardando'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--terracota)',marginTop:'5px'}},brl(pendTotal)))),

        // ── RSVP (confirmação de presença) ──
        CONFIG.rsvp.ativo && h('div',{className:'card',
          style:{padding:'16px',marginBottom:'22px'}},
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
            marginBottom:'13px'}},
            h('div',{className:'eyebrow'},'Confirmação de presença'),
            comRsvp.length>0 && h('button',{className:'btn btn-o btn-sm',
              style:{padding:'7px 12px',fontSize:'11.5px'},
              onClick:exportarCSV},'Exportar Excel')),

          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'9px'}},
            h('div',{style:{textAlign:'center'}},
              h('div',{className:'mono',style:{fontSize:'22px',fontWeight:600,
                color:'var(--oliva)'}}, totalPessoas),
              h('div',{style:{fontSize:'10.5px',color:'var(--tinta-suave)',
                marginTop:'2px'}},'pessoas')),
            h('div',{style:{textAlign:'center'}},
              h('div',{className:'mono',style:{fontSize:'22px',fontWeight:600,
                color:'var(--oliva)'}}, vao.length),
              h('div',{style:{fontSize:'10.5px',color:'var(--tinta-suave)',
                marginTop:'2px'}},'confirmaram')),
            h('div',{style:{textAlign:'center'}},
              h('div',{className:'mono',style:{fontSize:'22px',fontWeight:600,
                color:'var(--terracota)'}}, naoVao.length),
              h('div',{style:{fontSize:'10.5px',color:'var(--tinta-suave)',
                marginTop:'2px'}},'não vão')),
          ),

          comRestricao.length>0 && h('div',{style:{marginTop:'14px',paddingTop:'13px',
            borderTop:'1px solid var(--linha)'}},
            h('div',{style:{fontSize:'11.5px',fontWeight:600,marginBottom:'7px',
              color:'var(--tinta)'}},
              comRestricao.length+(comRestricao.length===1?' restrição alimentar':' restrições alimentares')),
            comRestricao.map((c,i)=>h('div',{key:i,
              style:{fontSize:'12px',color:'var(--tinta-suave)',lineHeight:1.5,marginBottom:'3px'}},
              h('b',{style:{color:'var(--tinta)'}},c.nome+': '),c.rsvp.restricao))),

          comRsvp.length===0 && h('div',{style:{marginTop:'12px',fontSize:'12px',
            color:'var(--tinta-suave)',textAlign:'center'}},
            'Ninguém confirmou ainda.')),

        h('div',{className:'card',style:{padding:'16px',marginBottom:'22px'}},
          h('div',{className:'eyebrow',style:{marginBottom:'9px'}},'Publicar recado no chat'),
          h('textarea',{className:'inp',rows:2,value:novoAviso,
            placeholder:'Ex: O portão abre às 15h. Estacionamento gratuito no local.',
            onChange:e=>setNovoAviso(e.target.value),
            style:{marginBottom:'10px'}}),
          h('button',{className:'btn btn-p btn-sm',disabled:!novoAviso.trim(),
            onClick:publicar,style:{width:'100%'}},'Publicar para todos')),

        h('div',{className:'tabs'},
          [['pendente','Aguardando '+pend.length],
           ['confirmado','Confirmados'],
           ['todos','Todos']].map(([k,l])=>
            h('button',{key:k,className:'tab'+(tab===k?' on':''),
              onClick:()=>setTab(k)},l))),

        h('div',{className:'card'},
          lista.length===0
            ? h('div',{style:{padding:'34px 20px',textAlign:'center',
                color:'var(--tinta-suave)',fontSize:'13px'}},'Nada aqui.')
            : lista.map(p=>h('div',{key:p.id,className:'ped'},
                h('div',{className:'ped-i'},
                  h('div',{className:'ped-n'},p.nome),
                  p.fone && h('a',{href:'https://wa.me/55'+p.fone,
                    target:'_blank',rel:'noopener',
                    onClick:e=>e.stopPropagation(),
                    style:{fontSize:'11.5px',color:'var(--terracota)',
                      textDecoration:'none',fontWeight:500}},
                    foneBonito(p.fone)),
                  h('div',{className:'ped-d'},
                    (p.itens||[]).map(i=>
                      i.qtd ? i.nome+' ('+i.qtd+'x)' : i.nome).join(' · ')),
                  h('div',{className:'badge '+(p.status==='confirmado'?'conf':'pend')},
                    (p.forma==='pix'?'Pix':'Cartão')+' · '+
                    (p.status==='confirmado'?'Confirmado':'Aguardando'))),
                h('div',{style:{textAlign:'right',flexShrink:0}},
                  h('div',{className:'ped-v mono'},brl(p.total)),
                  h('button',{className:'btn btn-sm '+(p.status==='confirmado'?'btn-o':'btn-p'),
                    style:{marginTop:'7px',fontSize:'11px',padding:'6px 11px'},
                    onClick:()=>mudar(p,p.status==='confirmado'?'pendente':'confirmado')},
                    p.status==='confirmado'?'Desfazer':'Confirmar'))))),
        h('div',{style:{height:'20px'}}))
    ));
}

/* ═════════════ NAV ═════════════ */

  const abas = festaOn
    ? [['casa', I.casa,  'Início'],
       ['gift', I.gift,  'Presentes'],
       ['festa',I.taca,  'Festa'],
       ['chat', I.chat,  'Conversa'],
       ['foto', I.foto,  'Álbum']]
    : [['casa', I.casa,  'Início'],
       ['gift', I.gift,  'Presentes'],
       ['chat', I.chat,  'Conversa'],
       ['foto', I.foto,  'Álbum'],
       ['local',I.pin,   'Local']];
  return h('nav',{className:'nav'},
    abas.map(([k,ic,l])=>
      h('button',{key:k,className:'nav-b'+(aba===k?' on':''),onClick:()=>setAba(k)},
        h(Ic,{d:ic,s:20}),
        h('span',null,l))));
}

/* ═══════════ ROTEAMENTO ═══════════
   #telao   → placar em tela cheia (TV do salão)
   #bandeja → operador (padrinho / madrinha)
   #noivos  → login dos noivos
   (nada)   → app do convidado
*/
function Raiz(){
  const [rota,setRota] = useState(()=>location.hash.toLowerCase());
  // A abertura (envelope+capa) aparece uma vez por dispositivo.
  const [abriu,setAbriu] = useState(()=>{
    try{ return localStorage.getItem(LSK+'_abriu')==='1'; }catch(e){ return false; }
  });
  useEffect(()=>{
    const f = ()=> setRota(location.hash.toLowerCase());
    window.addEventListener('hashchange', f);
    return ()=> window.removeEventListener('hashchange', f);
  },[]);

  // telão, bandeja e login dos noivos nunca passam pela abertura
  if(rota === '#telao')   return h(Telao);
  if(rota === '#bandeja') return h(Bandeja);

  if(!abriu && rota !== '#noivos') return h(Abertura,{onEntrar:()=>{
    try{ localStorage.setItem(LSK+'_abriu','1'); }catch(e){}
    setAbriu(true);
  }});

  return h(App);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Raiz));
</script>
</body>
</html>
